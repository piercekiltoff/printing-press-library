name: Generate per-app skills

on:
  push:
    branches: [main]
    paths:
      - 'registry.json'
      - 'library/**/.printing-press.json'
      - 'tools/generate-skills/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Share one push lane with generate-registry.yml. Both workflows
    # commit generated artifacts back to main after library metadata
    # changes, so queue them and check out main only after the lane is
    # acquired.
    concurrency:
      group: generated-artifact-push-main
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Run skill generator
        run: go run ./tools/generate-skills/main.go

      # Note: skills/ppl/references/registry.json is now owned by the
      # generate-registry workflow (it regenerates registry.json from
      # library/ and syncs the mirror in one step). Don't write to the
      # mirror here — concurrent runs of these two workflows would
      # otherwise race on the mirror file.

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli-skills/
          if git diff --staged --quiet; then
            echo "No skill changes to commit"
          else
            git commit -m "chore(skills): regenerate per-app skills [skip ci]"
            git push
          fi
