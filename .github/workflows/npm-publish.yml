name: Publish npm package

on:
  push:
    tags:
      - 'npm-v*'
  workflow_dispatch:

# Authenticates to npm via Trusted Publishing (OIDC). Configure on
# npmjs.com/package/@mvanhorn/printing-press → Settings → Trusted Publishers:
#   Provider:   GitHub Actions
#   Owner:      mvanhorn
#   Repository: printing-press-library
#   Workflow:   npm-publish.yml
# If the workflow filename or repo location changes, update the npm side too
# or releases will start failing with 401 Unauthorized.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      # Pin to a specific npm version that supports OIDC Trusted Publishing.
      # `npm install -g npm@latest` is flaky in CI — npm overwrites itself
      # mid-install and can leave the global install in a broken state with
      # a missing `promise-retry` module. Pinning avoids the race.
      - name: Use npm 11.5.1+ for Trusted Publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        working-directory: npm
        run: npm ci

      - name: Test
        working-directory: npm
        run: npm test

      - name: Build
        working-directory: npm
        run: npm run build

      - name: Publish
        working-directory: npm
        run: npm publish --access public --provenance
