name: recipe-goat
description: "Recipe GOAT — find the best version of any recipe across 15 trusted sites, with offline cookbook, pantry match, substitution lookup, meal planning, and USDA-backed nutrition."
version: "0.1.0"
base_url: "https://api.nal.usda.gov/fdc/v1"

auth:
  type: api_key
  header: "X-API-KEY"
  in: header
  env_vars:
    - USDA_FDC_API_KEY

config:
  format: toml
  path: "~/.config/recipe-goat-pp-cli/config.toml"

resources:
  foods:
    description: "USDA FoodData Central — ingredient nutrition lookups"
    endpoints:
      search:
        method: GET
        path: "/foods/search"
        description: "Search USDA FoodData Central for foods matching a query"
        params:
          - name: query
            type: string
            required: true
            description: "Search term (e.g., 'chicken breast raw')"
          - name: pageSize
            type: int
            description: "Results per page (1–200)"
          - name: pageNumber
            type: int
            description: "Page number (1-indexed)"
          - name: dataType
            type: string
            description: "Comma-separated list: Foundation,SR Legacy,Branded,Survey (FNDDS)"
        response:
          type: object
          item: FoodSearchResult

      get:
        method: GET
        path: "/food/{fdc_id}"
        description: "Get a specific food by FDC ID"
        params:
          - name: fdc_id
            type: string
            required: true
            positional: true
            description: "FoodData Central ID"
          - name: nutrients
            type: string
            description: "Comma-separated nutrient IDs to return"
        response:
          type: object
          item: Food

      list:
        method: GET
        path: "/foods/list"
        description: "List foods paginated"
        params:
          - name: pageSize
            type: int
            description: "Results per page (1–200)"
          - name: pageNumber
            type: int
            description: "Page number (1-indexed)"
          - name: dataType
            type: string
            description: "Comma-separated list: Foundation,SR Legacy,Branded,Survey (FNDDS)"
        response:
          type: array
          item: Food
