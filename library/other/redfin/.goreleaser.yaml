version: 2
project_name: redfin-pp-cli
changelog:
  disable: true
builds:
  - id: redfin-pp-cli
    main: ./cmd/redfin-pp-cli
    binary: redfin-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/redfin/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: redfin-pp-mcp
    main: ./cmd/redfin-pp-mcp
    binary: redfin-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: redfin-pp-cli
    repository:
      owner: rderwin
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search Redfin homes for sale via internal Stingray endpoints, sync to local SQLite, and run workflows the website doesn't expose — saved-search diff, $/sqft net-HOA ranking, sold comps, multi-region trends."
    install: |
      bin.install "redfin-pp-cli"
      bin.install "redfin-pp-mcp"
