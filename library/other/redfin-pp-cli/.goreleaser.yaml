version: 2
project_name: redfin-stingray-unofficial-pp-cli
changelog:
  disable: true
builds:
  - id: redfin-stingray-unofficial-pp-cli
    main: ./cmd/redfin-stingray-unofficial-pp-cli
    binary: redfin-stingray-unofficial-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X redfin-stingray-unofficial-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: redfin-stingray-unofficial-mcp
    main: ./cmd/redfin-stingray-unofficial-mcp
    binary: redfin-stingray-unofficial-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: redfin-stingray-unofficial-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/user/redfin-stingray-unofficial-pp-cli"
    description: "Reverse-engineered Redfin real estate API endpoints"
    install: |
      bin.install "redfin-stingray-unofficial-pp-cli"
      bin.install "redfin-stingray-unofficial-mcp"
