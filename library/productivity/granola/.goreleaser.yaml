version: 2
project_name: granola-pp-cli
changelog:
  disable: true
builds:
  - id: granola-pp-cli
    main: ./cmd/granola-pp-cli
    binary: granola-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/granola/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: granola-pp-mcp
    main: ./cmd/granola-pp-mcp
    binary: granola-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: granola-pp-cli
    repository:
      owner: dstevens
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Granola feature — plus offline SQLite cross-meeting search, attendee timelines, and a MEMO pipeline runner..."
    install: |
      bin.install "granola-pp-cli"
      bin.install "granola-pp-mcp"
