version: 2
project_name: outlook-email-pp-cli
changelog:
  disable: true
builds:
  - id: outlook-email-pp-cli
    main: ./cmd/outlook-email-pp-cli
    binary: outlook-email-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/outlook-email/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: outlook-email-pp-mcp
    main: ./cmd/outlook-email-pp-mcp
    binary: outlook-email-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: outlook-email-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Drive your personal Microsoft 365 inbox from agents — read, send, sync, and run offline triage analytics that..."
    install: |
      bin.install "outlook-email-pp-cli"
      bin.install "outlook-email-pp-mcp"
