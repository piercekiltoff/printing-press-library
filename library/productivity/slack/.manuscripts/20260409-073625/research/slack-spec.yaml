name: slack
display_name: Slack
description: Send messages, search conversations, manage channels and users in your Slack workspace
base_url: https://slack.com/api
auth:
  type: bearer_token
  header: Authorization
  env_vars:
    - SLACK_BOT_TOKEN
    - SLACK_USER_TOKEN

resources:
  messages:
    description: Send, read, update, and delete messages in channels and DMs
    endpoints:
      post_message:
        method: POST
        path: /chat.postMessage
        description: Send a message to a channel, DM, or thread
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID or name to send the message to
          - name: text
            type: string
            required: true
            description: Message text (supports mrkdwn formatting)
          - name: thread_ts
            type: string
            description: Thread timestamp to reply in a thread
          - name: unfurl_links
            type: boolean
            description: Enable or disable link unfurling
      update_message:
        method: POST
        path: /chat.update
        description: Update an existing message
        params:
          - name: channel
            type: string
            required: true
            description: Channel containing the message
          - name: ts
            type: string
            required: true
            description: Timestamp of the message to update
          - name: text
            type: string
            required: true
            description: New message text
      delete_message:
        method: POST
        path: /chat.delete
        description: Delete a message
        params:
          - name: channel
            type: string
            required: true
            description: Channel containing the message
          - name: ts
            type: string
            required: true
            description: Timestamp of the message to delete
      schedule_message:
        method: POST
        path: /chat.scheduleMessage
        description: Schedule a message for later delivery
        params:
          - name: channel
            type: string
            required: true
            description: Channel to send the scheduled message to
          - name: text
            type: string
            required: true
            description: Message text
          - name: post_at
            type: integer
            required: true
            description: Unix timestamp for when to send the message
      list_scheduled:
        method: POST
        path: /chat.scheduledMessages.list
        description: List scheduled messages
        params:
          - name: channel
            type: string
            description: Filter by channel
      get_permalink:
        method: GET
        path: /chat.getPermalink
        description: Get a permalink URL for a message
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: message_ts
            type: string
            required: true
            description: Message timestamp

  conversations:
    description: Read channel history, list channels, manage channel membership
    endpoints:
      list:
        method: GET
        path: /conversations.list
        description: List all channels in the workspace
        params:
          - name: types
            type: string
            description: "Comma-separated channel types: public_channel, private_channel, mpim, im"
          - name: limit
            type: integer
            description: Maximum number of channels to return (max 1000)
          - name: cursor
            type: string
            description: Pagination cursor
          - name: exclude_archived
            type: boolean
            description: Exclude archived channels
      history:
        method: GET
        path: /conversations.history
        description: Fetch message history for a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: limit
            type: integer
            description: Number of messages to return (max 1000)
          - name: cursor
            type: string
            description: Pagination cursor
          - name: oldest
            type: string
            description: Only messages after this Unix timestamp
          - name: latest
            type: string
            description: Only messages before this Unix timestamp
      replies:
        method: GET
        path: /conversations.replies
        description: Fetch replies in a thread
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID containing the thread
          - name: ts
            type: string
            required: true
            description: Thread parent message timestamp
          - name: limit
            type: integer
            description: Number of replies to return
          - name: cursor
            type: string
            description: Pagination cursor
      info:
        method: GET
        path: /conversations.info
        description: Get information about a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
      members:
        method: GET
        path: /conversations.members
        description: List members of a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: limit
            type: integer
            description: Maximum members to return
          - name: cursor
            type: string
            description: Pagination cursor
      create:
        method: POST
        path: /conversations.create
        description: Create a new channel
        params:
          - name: name
            type: string
            required: true
            description: Name of the channel
          - name: is_private
            type: boolean
            description: Create a private channel
      archive:
        method: POST
        path: /conversations.archive
        description: Archive a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID to archive
      unarchive:
        method: POST
        path: /conversations.unarchive
        description: Unarchive a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID to unarchive
      invite:
        method: POST
        path: /conversations.invite
        description: Invite users to a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: users
            type: string
            required: true
            description: Comma-separated list of user IDs to invite
      set_topic:
        method: POST
        path: /conversations.setTopic
        description: Set the topic for a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: topic
            type: string
            required: true
            description: New topic text
      set_purpose:
        method: POST
        path: /conversations.setPurpose
        description: Set the purpose for a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: purpose
            type: string
            required: true
            description: New purpose text
      mark:
        method: POST
        path: /conversations.mark
        description: Mark a channel as read up to a specific message
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: ts
            type: string
            required: true
            description: Timestamp of the message to mark as read

  users:
    description: List and look up workspace users
    endpoints:
      list:
        method: GET
        path: /users.list
        description: List all users in the workspace
        params:
          - name: limit
            type: integer
            description: Maximum number of users to return
          - name: cursor
            type: string
            description: Pagination cursor
      info:
        method: GET
        path: /users.info
        description: Get information about a user
        params:
          - name: user
            type: string
            required: true
            description: User ID
      lookup_by_email:
        method: GET
        path: /users.lookupByEmail
        description: Find a user by their email address
        params:
          - name: email
            type: string
            required: true
            description: Email address to look up
      get_presence:
        method: GET
        path: /users.getPresence
        description: Get a user's online presence status
        params:
          - name: user
            type: string
            required: true
            description: User ID
      set_presence:
        method: POST
        path: /users.setPresence
        description: Set the user's presence status
        params:
          - name: presence
            type: string
            required: true
            description: "Either 'auto' or 'away'"
      profile_get:
        method: GET
        path: /users.profile.get
        description: Get a user's profile information
        params:
          - name: user
            type: string
            description: User ID (defaults to authed user)
      profile_set:
        method: POST
        path: /users.profile.set
        description: Set the user's profile fields
        params:
          - name: profile
            type: string
            description: JSON object with profile fields to set
          - name: name
            type: string
            description: Name of a single field to set
          - name: value
            type: string
            description: Value for the single field

  search:
    description: Search messages and files across the workspace
    endpoints:
      messages:
        method: GET
        path: /search.messages
        description: Search for messages matching a query
        params:
          - name: query
            type: string
            required: true
            description: Search query (supports Slack search modifiers like from:, in:, has:)
          - name: count
            type: integer
            description: Number of results per page
          - name: page
            type: integer
            description: Page number of results
          - name: sort
            type: string
            description: "Sort order: score or timestamp"
          - name: sort_dir
            type: string
            description: "Sort direction: asc or desc"

  reactions:
    description: Add and remove emoji reactions on messages
    endpoints:
      add:
        method: POST
        path: /reactions.add
        description: Add an emoji reaction to a message
        params:
          - name: channel
            type: string
            required: true
            description: Channel containing the message
          - name: name
            type: string
            required: true
            description: Emoji name without colons
          - name: timestamp
            type: string
            required: true
            description: Message timestamp
      remove:
        method: POST
        path: /reactions.remove
        description: Remove an emoji reaction from a message
        params:
          - name: channel
            type: string
            required: true
            description: Channel containing the message
          - name: name
            type: string
            required: true
            description: Emoji name without colons
          - name: timestamp
            type: string
            required: true
            description: Message timestamp
      get:
        method: GET
        path: /reactions.get
        description: Get reactions for a message
        params:
          - name: channel
            type: string
            required: true
            description: Channel containing the message
          - name: timestamp
            type: string
            required: true
            description: Message timestamp
      list:
        method: GET
        path: /reactions.list
        description: List reactions made by the authenticated user
        params:
          - name: count
            type: integer
            description: Number of items per page
          - name: cursor
            type: string
            description: Pagination cursor
          - name: user
            type: string
            description: Show reactions by this user (defaults to authed user)

  files:
    description: Upload, list, and manage files
    endpoints:
      upload:
        method: POST
        path: /files.upload
        description: Upload a file to Slack
        params:
          - name: channels
            type: string
            description: Comma-separated channel IDs to share the file with
          - name: content
            type: string
            description: File content (for text-based files)
          - name: filename
            type: string
            description: Filename
          - name: title
            type: string
            description: Title of the file
          - name: initial_comment
            type: string
            description: Initial comment for the file
      list:
        method: GET
        path: /files.list
        description: List files in the workspace
        params:
          - name: channel
            type: string
            description: Filter by channel
          - name: user
            type: string
            description: Filter by user
          - name: types
            type: string
            description: "Filter by file type: all, spaces, snippets, images, etc."
          - name: count
            type: integer
            description: Number of files per page
          - name: page
            type: integer
            description: Page number
      info:
        method: GET
        path: /files.info
        description: Get information about a file
        params:
          - name: file
            type: string
            required: true
            description: File ID
      delete:
        method: POST
        path: /files.delete
        description: Delete a file
        params:
          - name: file
            type: string
            required: true
            description: File ID to delete

  reminders:
    description: Create and manage personal reminders
    endpoints:
      add:
        method: POST
        path: /reminders.add
        description: Create a new reminder
        params:
          - name: text
            type: string
            required: true
            description: Reminder text
          - name: time
            type: string
            required: true
            description: "When to remind: Unix timestamp, or natural language like 'in 15 minutes'"
          - name: user
            type: string
            description: User to remind (defaults to authed user)
      list:
        method: GET
        path: /reminders.list
        description: List all reminders for the authenticated user
      complete:
        method: POST
        path: /reminders.complete
        description: Mark a reminder as complete
        params:
          - name: reminder
            type: string
            required: true
            description: Reminder ID
      delete:
        method: POST
        path: /reminders.delete
        description: Delete a reminder
        params:
          - name: reminder
            type: string
            required: true
            description: Reminder ID
      info:
        method: GET
        path: /reminders.info
        description: Get info about a reminder
        params:
          - name: reminder
            type: string
            required: true
            description: Reminder ID

  pins:
    description: Pin and unpin messages in channels
    endpoints:
      add:
        method: POST
        path: /pins.add
        description: Pin a message to a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: timestamp
            type: string
            required: true
            description: Message timestamp to pin
      list:
        method: GET
        path: /pins.list
        description: List pinned items in a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
      remove:
        method: POST
        path: /pins.remove
        description: Unpin a message from a channel
        params:
          - name: channel
            type: string
            required: true
            description: Channel ID
          - name: timestamp
            type: string
            required: true
            description: Message timestamp to unpin

  stars:
    description: Star and unstar messages and files
    endpoints:
      add:
        method: POST
        path: /stars.add
        description: Star a message, file, or channel
        params:
          - name: channel
            type: string
            description: Channel ID (for starring the channel itself)
          - name: timestamp
            type: string
            description: Message timestamp (for starring a message)
          - name: file
            type: string
            description: File ID (for starring a file)
      list:
        method: GET
        path: /stars.list
        description: List starred items
        params:
          - name: count
            type: integer
            description: Number of items per page
          - name: cursor
            type: string
            description: Pagination cursor
      remove:
        method: POST
        path: /stars.remove
        description: Remove a star from an item
        params:
          - name: channel
            type: string
            description: Channel ID
          - name: timestamp
            type: string
            description: Message timestamp
          - name: file
            type: string
            description: File ID

  dnd:
    description: Manage Do Not Disturb settings
    endpoints:
      set_snooze:
        method: POST
        path: /dnd.setSnooze
        description: Turn on Do Not Disturb for a specified number of minutes
        params:
          - name: num_minutes
            type: integer
            required: true
            description: Number of minutes to snooze
      end_snooze:
        method: POST
        path: /dnd.endSnooze
        description: End the current Do Not Disturb session
      end_dnd:
        method: POST
        path: /dnd.endDnd
        description: End the current Do Not Disturb session immediately
      info:
        method: GET
        path: /dnd.info
        description: Get DND status for the authenticated user
        params:
          - name: user
            type: string
            description: User ID (defaults to authed user)
      team_info:
        method: POST
        path: /dnd.teamInfo
        description: Get DND status for multiple users
        params:
          - name: users
            type: string
            required: true
            description: Comma-separated list of user IDs

  usergroups:
    description: Manage workspace user groups
    endpoints:
      list:
        method: GET
        path: /usergroups.list
        description: List all user groups in the workspace
        params:
          - name: include_users
            type: boolean
            description: Include user lists in response
          - name: include_disabled
            type: boolean
            description: Include disabled user groups
      create:
        method: POST
        path: /usergroups.create
        description: Create a new user group
        params:
          - name: name
            type: string
            required: true
            description: Name of the user group
          - name: handle
            type: string
            description: Mention handle (e.g., @team-leads)
          - name: description
            type: string
            description: Description of the group
          - name: channels
            type: string
            description: Comma-separated channel IDs the group defaults to
      update:
        method: POST
        path: /usergroups.update
        description: Update an existing user group
        params:
          - name: usergroup
            type: string
            required: true
            description: User group ID
          - name: name
            type: string
            description: New name
          - name: handle
            type: string
            description: New mention handle
          - name: description
            type: string
            description: New description
      users_list:
        method: GET
        path: /usergroups.users.list
        description: List users in a user group
        params:
          - name: usergroup
            type: string
            required: true
            description: User group ID
      users_update:
        method: POST
        path: /usergroups.users.update
        description: Update the members of a user group
        params:
          - name: usergroup
            type: string
            required: true
            description: User group ID
          - name: users
            type: string
            required: true
            description: Comma-separated list of user IDs

  emoji:
    description: List custom emoji in the workspace
    endpoints:
      list:
        method: GET
        path: /emoji.list
        description: List all custom emoji for the workspace

  team:
    description: Get workspace information
    endpoints:
      info:
        method: GET
        path: /team.info
        description: Get information about the workspace
      access_logs:
        method: GET
        path: /team.accessLogs
        description: Get workspace access logs (requires admin)
        params:
          - name: count
            type: integer
            description: Number of entries per page
          - name: page
            type: integer
            description: Page number
      billable_info:
        method: GET
        path: /team.billableInfo
        description: Get billable information for workspace users
        params:
          - name: user
            type: string
            description: Filter by user ID

  auth:
    description: Test and manage authentication
    endpoints:
      test:
        method: POST
        path: /auth.test
        description: Test the authentication token and get identity info
      revoke:
        method: GET
        path: /auth.revoke
        description: Revoke the current authentication token
        params:
          - name: test
            type: boolean
            description: Test mode - check without revoking

  bots:
    description: Get information about bot users
    endpoints:
      info:
        method: GET
        path: /bots.info
        description: Get information about a bot user
        params:
          - name: bot
            type: string
            required: true
            description: Bot user ID
