version: 2
project_name: cal-com-pp-cli
changelog:
  disable: true
builds:
  - id: cal-com-pp-cli
    main: ./cmd/cal-com-pp-cli
    binary: cal-com-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/cal-com-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: cal-com-pp-mcp
    main: ./cmd/cal-com-pp-mcp
    binary: cal-com-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: cal-com-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Cal.com v2 API — scheduling infrastructure. Authenticate with a Bearer token (API key from Settings > Developer > API Keys). Supports per-endpoint versioning via cal-api-version header."
    install: |
      bin.install "cal-com-pp-cli"
      bin.install "cal-com-pp-mcp"
