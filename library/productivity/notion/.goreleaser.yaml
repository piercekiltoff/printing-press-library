version: 2
project_name: notion-pp-cli
changelog:
  disable: true
builds:
  - id: notion-pp-cli
    main: ./cmd/notion-pp-cli
    binary: notion-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/notion/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: notion-pp-mcp
    main: ./cmd/notion-pp-mcp
    binary: notion-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: notion-pp-cli
    repository:
      owner: nikica-jokic
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Notion database queryable offline — cross-workspace SQL joins, stale detection, and relation graph traversal..."
    install: |
      bin.install "notion-pp-cli"
      bin.install "notion-pp-mcp"
