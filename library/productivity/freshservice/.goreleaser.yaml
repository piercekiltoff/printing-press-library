version: 2
project_name: freshservice-pp-cli
changelog:
  disable: true
builds:
  - id: freshservice-pp-cli
    main: ./cmd/freshservice-pp-cli
    binary: freshservice-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/freshservice/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: freshservice-pp-mcp
    main: ./cmd/freshservice-pp-mcp
    binary: freshservice-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: freshservice-pp-cli
    repository:
      owner: mark-van-de-ven
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Freshservice operation in one Go binary — with offline search, SLA intelligence, and agent-native JSON that..."
    install: |
      bin.install "freshservice-pp-cli"
      bin.install "freshservice-pp-mcp"
