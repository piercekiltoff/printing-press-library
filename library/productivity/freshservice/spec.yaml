            schema:
              type: object
              required: [title]
              properties:
                title: {type: string}
                description: {type: string}
      responses:
        "201":
          description: Created
  /changes/{id}/tasks/{task_id}:
    put:
      operationId: updateChangeTask
      summary: Update change task
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
        - name: task_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: {type: string}
                status: {type: integer}
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteChangeTask
      summary: Delete change task
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
        - name: task_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "204":
          description: Deleted
  /changes/{id}/notes:
    get:
      operationId: listChangeNotes
      summary: List change notes
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Notes
    post:
      operationId: createChangeNote
      summary: Create change note
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: {type: string}
      responses:
        "201":
          description: Created
  /changes/{id}/time_entries:
    get:
      operationId: listChangeTimeEntries
      summary: List change time entries
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Time entries
    post:
      operationId: createChangeTimeEntry
      summary: Create change time entry
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [time_spent]
              properties:
                time_spent: {type: string, description: "Format hh:mm"}
                note: {type: string}
                agent_id: {type: integer}
      responses:
        "201":
          description: Created
  /change_form_fields:
    get:
      operationId: listChangeFormFields
      summary: List change form fields
      tags: [changes]
      responses:
        "200":
          description: Form fields
  /assets:
    get:
      operationId: listAssets
      summary: List or search assets
      tags: [assets]
      parameters:
        - name: search
          in: query
          schema: {type: string}
        - name: filter
          in: query
          schema: {type: string}
        - name: page
          in: query
          schema: {type: integer}
        - name: per_page
          in: query
          schema: {type: integer}
      responses:
        "200":
          description: Assets
    post:
      operationId: createAsset
      summary: Create an asset
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, asset_type_id]
              properties:
                name: {type: string}
                asset_type_id: {type: integer}
                description: {type: string}
                asset_tag: {type: string}
                user_id: {type: integer}
                department_id: {type: integer}
                location_id: {type: integer}
      responses:
        "201":
          description: Asset created
  /assets/{display_id}:
    get:
      operationId: getAsset
      summary: Get asset by display ID
      tags: [assets]
      parameters:
        - name: display_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Asset
    put:
      operationId: updateAsset
      summary: Update an asset
      tags: [assets]
      parameters:
        - name: display_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                description: {type: string}
                user_id: {type: integer}
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteAsset
      summary: Delete an asset
      tags: [assets]
      parameters:
        - name: display_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "204":
