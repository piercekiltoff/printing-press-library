openapi: "3.0.3"
info:
  title: Freshservice API
  version: "2"
  description: "Freshservice ITSM REST API v2 — tickets, changes, assets, users, and more."
servers:
  - url: "https://{domain}/api/v2"
    variables:
      domain:
        default: "yourcompany.freshservice.com"
        description: "Your Freshservice domain (e.g. acme.freshservice.com)"
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: "API key as username, empty string as password. Set FRESHSERVICE_APIKEY and FRESHSERVICE_DOMAIN."
      x-auth-vars:
        - name: FRESHSERVICE_APIKEY
          kind: per_call
          required: true
          sensitive: true
          description: "Personal Access Token from Freshservice Profile Settings → API Settings"
        - name: FRESHSERVICE_DOMAIN
          kind: per_call
          required: true
          sensitive: false
          description: "Your Freshservice subdomain, e.g. acme.freshservice.com"
security:
  - basicAuth: []
paths:
  /tickets:
    get:
      operationId: listTickets
      summary: List tickets
      tags: [tickets]
      parameters:
        - name: page
          in: query
          schema: {type: integer}
        - name: per_page
          in: query
          schema: {type: integer}
        - name: order_type
          in: query
          schema: {type: string, enum: [asc, desc]}
      responses:
        "200":
          description: List of tickets
    post:
      operationId: createTicket
      summary: Create a ticket
      tags: [tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject]
              properties:
                subject: {type: string}
                description: {type: string}
                email: {type: string}
                requester_id: {type: integer}
                status: {type: integer, description: "2=Open 3=Pending 4=Resolved 5=Closed"}
                priority: {type: integer, description: "1=Low 2=Medium 3=High 4=Urgent"}
                source: {type: integer, description: "1=Email 2=Portal 3=Phone 7=Chat 10=Slack 15=Teams"}
                group_id: {type: integer}
                responder_id: {type: integer}
                type: {type: string}
                due_by: {type: string, format: date-time}
      responses:
        "201":
          description: Ticket created
  /tickets/filter:
    get:
      operationId: filterTickets
      summary: Filter tickets by query
      tags: [tickets]
      parameters:
        - name: query
          in: query
          required: true
          schema: {type: string}
          description: 'Filter query string, must be double-quoted e.g. "status:2 AND priority:3"'
        - name: page
          in: query
          schema: {type: integer}
        - name: per_page
          in: query
          schema: {type: integer}
      responses:
        "200":
          description: Filtered tickets
  /tickets/{id}:
    get:
      operationId: getTicket
      summary: Get ticket by ID
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
        - name: include
          in: query
          schema: {type: string}
      responses:
        "200":
          description: Ticket details
    put:
      operationId: updateTicket
      summary: Update a ticket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                subject: {type: string}
                description: {type: string}
                status: {type: integer}
                priority: {type: integer}
                group_id: {type: integer}
                responder_id: {type: integer}
                due_by: {type: string, format: date-time}
      responses:
        "200":
          description: Updated ticket
    delete:
      operationId: deleteTicket
      summary: Delete a ticket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "204":
          description: Deleted
  /tickets/{id}/restore:
    put:
      operationId: restoreTicket
      summary: Restore deleted ticket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Restored
  /tickets/{id}/activities:
    get:
      operationId: listTicketActivities
      summary: Get ticket activity log
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Activity log
  /tickets/{id}/conversations:
    get:
      operationId: listTicketConversations
      summary: List ticket conversations
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Conversations
  /tickets/{id}/notes:
    post:
      operationId: createTicketNote
      summary: Add a note to ticket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: {type: string}
                private: {type: boolean}
      responses:
        "201":
          description: Note created
  /tickets/{id}/reply:
    post:
      operationId: replyToTicket
      summary: Reply to ticket requester
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: {type: string}
                from_email: {type: string}
                cc_emails:
                  type: array
                  items: {type: string}
                bcc_emails:
                  type: array
                  items: {type: string}
      responses:
        "201":
          description: Reply sent
  /tickets/{id}/tasks:
    get:
      operationId: listTicketTasks
      summary: List ticket tasks
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Tasks
    post:
      operationId: createTicketTask
      summary: Create ticket task
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: {type: string}
                description: {type: string}
                due_date: {type: string, format: date-time}
                agent_id: {type: integer}
      responses:
        "201":
          description: Task created
  /tickets/{id}/tasks/{task_id}:
    get:
      operationId: getTicketTask
      summary: Get ticket task
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
        - name: task_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Task
    put:
      operationId: updateTicketTask
      summary: Update ticket task
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
        - name: task_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: {type: string}
                status: {type: integer, description: "1=Open 2=In Progress 3=Completed"}
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteTicketTask
      summary: Delete ticket task
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
        - name: task_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "204":
          description: Deleted
  /tickets/{id}/time_entries:
    get:
      operationId: listTicketTimeEntries
      summary: List ticket time entries
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Time entries
    post:
      operationId: createTicketTimeEntry
      summary: Create ticket time entry
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [time_spent]
              properties:
                time_spent: {type: string, description: "Format hh:mm e.g. 01:30"}
                note: {type: string}
                agent_id: {type: integer}
      responses:
        "201":
          description: Time entry created
  /ticket_form_fields:
    get:
      operationId: listTicketFormFields
      summary: List ticket form fields
      tags: [tickets]
      responses:
        "200":
          description: Form fields
  /changes:
    get:
      operationId: listChanges
      summary: List changes
      tags: [changes]
      parameters:
        - name: page
          in: query
          schema: {type: integer}
        - name: per_page
          in: query
          schema: {type: integer}
      responses:
        "200":
          description: Changes
    post:
      operationId: createChange
      summary: Create a change
      tags: [changes]
      requestBody:
        required: true
