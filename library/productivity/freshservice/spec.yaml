      summary: Update requester
      tags: [requesters]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: {type: string}
                last_name: {type: string}
                primary_email: {type: string}
                job_title: {type: string}
      responses:
        "200":
          description: Updated
    delete:
      operationId: deactivateRequester
      summary: Deactivate requester
      tags: [requesters]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "204":
          description: Deactivated
  /requesters/{id}/reactivate:
    put:
      operationId: reactivateRequester
      summary: Reactivate requester
      tags: [requesters]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Reactivated
  /requesters/{id}/convert_to_agent:
    put:
      operationId: convertRequesterToAgent
      summary: Convert requester to agent
      tags: [requesters]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Converted
  /requester_fields:
    get:
      operationId: listRequesterFields
      summary: List requester form fields
      tags: [requesters]
      responses:
        "200":
          description: Fields
  /agents:
