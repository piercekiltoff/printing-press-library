          application/json:
            schema:
              type: object
              required: [subject, requester_id]
              properties:
                subject: {type: string}
                description: {type: string}
                requester_id: {type: integer}
                priority: {type: integer, description: "1=Low 2=Medium 3=High 4=Urgent"}
                impact: {type: integer, description: "1=Low 2=Medium 3=High"}
                status: {type: integer, description: "1=Open 2=Planning 3=Awaiting Approval 4=Pending Release 5=Pending Review 6=Closed"}
                risk: {type: integer, description: "1=Low 2=Medium 3=High 4=Very High"}
                change_type: {type: integer, description: "1=Minor 2=Standard 3=Major 4=Emergency"}
                planned_start_date: {type: string, format: date-time}
                planned_end_date: {type: string, format: date-time}
      responses:
        "201":
          description: Change created
  /changes/filter:
    get:
      operationId: filterChanges
      summary: Filter changes by query
      tags: [changes]
      parameters:
