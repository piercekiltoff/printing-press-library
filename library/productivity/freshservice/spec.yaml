          schema: {type: integer}
        - name: per_page
          in: query
          schema: {type: integer}
      responses:
        "200":
          description: Agents
    post:
      operationId: createAgent
      summary: Create an agent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, email]
              properties:
                first_name: {type: string}
                last_name: {type: string}
                email: {type: string}
                job_title: {type: string}
                phone: {type: string}
      responses:
        "201":
          description: Agent created
  /agents/{id}:
    get:
      operationId: getAgent
      summary: Get agent by ID
      tags: [agents]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Agent
    put:
      operationId: updateAgent
      summary: Update agent
      tags: [agents]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
