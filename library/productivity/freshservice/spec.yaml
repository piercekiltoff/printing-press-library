      responses:
        "200":
          description: Contracts
  /requesters:
    get:
      operationId: listRequesters
      summary: List requesters
      tags: [requesters]
      parameters:
        - name: query
          in: query
          schema: {type: string}
        - name: page
          in: query
          schema: {type: integer}
        - name: per_page
          in: query
          schema: {type: integer}
      responses:
        "200":
          description: Requesters
    post:
      operationId: createRequester
      summary: Create a requester
      tags: [requesters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, primary_email]
              properties:
                first_name: {type: string}
                last_name: {type: string}
                primary_email: {type: string}
                job_title: {type: string}
                phone: {type: string}
                department_id: {type: integer}
                location_id: {type: integer}
      responses:
        "201":
          description: Requester created
  /requesters/{id}:
    get:
      operationId: getRequester
      summary: Get requester by ID
      tags: [requesters]
      parameters:
        - name: id
          in: path
          required: true
