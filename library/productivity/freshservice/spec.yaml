            schema:
              type: object
              properties:
                subject: {type: string}
                status: {type: integer}
                priority: {type: integer}
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteChange
      summary: Delete a change
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "204":
          description: Deleted
  /changes/{id}/tasks:
    get:
      operationId: listChangeTasks
      summary: List change tasks
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Tasks
    post:
      operationId: createChangeTask
      summary: Create change task
      tags: [changes]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
