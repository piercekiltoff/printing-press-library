          description: Deleted
  /agent_fields:
    get:
      operationId: listAgentFields
      summary: List agent form fields
      tags: [agents]
      responses:
        "200":
          description: Fields
  /groups:
    get:
      operationId: listGroups
      summary: List agent groups
      tags: [groups]
      responses:
        "200":
          description: Groups
    post:
      operationId: createGroup
      summary: Create agent group
      tags: [groups]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: {type: string}
                description: {type: string}
      responses:
        "201":
          description: Created
  /groups/{id}:
    get:
      operationId: getGroup
      summary: Get agent group
      tags: [groups]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: Group
    put:
      operationId: updateGroup
      summary: Update agent group
      tags: [groups]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                description: {type: string}
      responses:
        "200":
          description: Updated
  /service_catalog/items:
    get:
      operationId: listServiceCatalogItems
      summary: List service catalog items
      tags: [catalog]
      parameters:
        - name: page
          in: query
          schema: {type: integer}
        - name: per_page
          in: query
          schema: {type: integer}
      responses:
        "200":
          description: Catalog items
