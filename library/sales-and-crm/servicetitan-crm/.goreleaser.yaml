version: 2
project_name: servicetitan-crm-pp-cli
changelog:
  disable: true
builds:
  - id: servicetitan-crm-pp-cli
    main: ./cmd/servicetitan-crm-pp-cli
    binary: servicetitan-crm-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/sales-and-crm/servicetitan-crm/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: servicetitan-crm-pp-mcp
    main: ./cmd/servicetitan-crm-pp-mcp
    binary: servicetitan-crm-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: servicetitan-crm-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every ServiceTitan CRM endpoint plus customer-360 search, lead-followup audit, and a 2-tool MCP surface that..."
    install: |
      bin.install "servicetitan-crm-pp-cli"
      bin.install "servicetitan-crm-pp-mcp"
