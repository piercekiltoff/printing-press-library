          - name: hs_email_direction
            type: string
            description: "Direction (INCOMING_EMAIL, FORWARDED_EMAIL)"
          - name: hs_timestamp
            type: string
            description: "Email timestamp (ISO 8601)"
      delete:
        method: DELETE
        path: "/crm/v3/objects/emails/{emailId}"
        description: "Delete an email"
        params:
          - name: emailId
            type: string
            required: true
            positional: true
            description: "Email ID"

  meetings:
    description: "Manage logged meeting engagements"
    endpoints:
      list:
        method: GET
        path: "/crm/v3/objects/meetings"
        description: "List meetings"
        response_path: "results"
        params:
          - name: limit
