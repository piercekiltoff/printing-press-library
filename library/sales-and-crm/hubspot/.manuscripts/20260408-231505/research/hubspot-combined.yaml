        description: "Get a call by ID"
        params:
          - name: callId
            type: string
            required: true
            positional: true
            description: "Call ID"
      create:
        method: POST
        path: "/crm/v3/objects/calls"
        description: "Log a call"
        body:
          - name: hs_call_title
            type: string
            description: "Call title"
          - name: hs_call_body
            type: string
            description: "Call notes"
          - name: hs_call_direction
            type: string
            description: "Direction (INBOUND, OUTBOUND)"
          - name: hs_call_duration
            type: string
            description: "Duration in milliseconds"
          - name: hs_timestamp
            type: string
            description: "Call timestamp (ISO 8601)"
      delete:
        method: DELETE
        path: "/crm/v3/objects/calls/{callId}"
        description: "Delete a call"
        params:
          - name: callId
            type: string
            required: true
            positional: true
            description: "Call ID"

