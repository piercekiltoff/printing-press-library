    endpoints:
      list:
        method: GET
        path: "/crm/v3/lists"
        description: "List all contact lists"
        response_path: "lists"
        params:
          - name: offset
            type: int
            description: "Offset for pagination"
          - name: count
            type: int
            description: "Number of lists to return"
      get:
        method: GET
        path: "/crm/v3/lists/{listId}"
        description: "Get a list by ID"
        params:
          - name: listId
            type: string
            required: true
            positional: true
            description: "List ID"
      members:
        method: GET
        path: "/crm/v3/lists/{listId}/memberships"
        description: "Get members of a list"
        params:
          - name: listId
            type: string
            required: true
            positional: true
            description: "List ID"
