          - name: hs_task_priority
            type: string
            description: "Priority (LOW, MEDIUM, HIGH)"
          - name: hs_timestamp
            type: string
            description: "Due date (ISO 8601)"
      update:
        method: PATCH
        path: "/crm/v3/objects/tasks/{taskId}"
        description: "Update a task"
        params:
          - name: taskId
            type: string
            required: true
            positional: true
            description: "Task ID"
        body:
          - name: hs_task_subject
            type: string
            description: "Task subject"
          - name: hs_task_status
            type: string
            description: "Status"
      delete:
        method: DELETE
