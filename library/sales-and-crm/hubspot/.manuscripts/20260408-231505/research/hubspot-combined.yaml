            type: string
            required: true
            description: "Property name (internal)"
          - name: label
            type: string
            required: true
            description: "Property label (display)"
          - name: type
            type: string
            required: true
            description: "Property type (string, number, date, enumeration)"
          - name: fieldType
            type: string
            required: true
            description: "Field type (text, textarea, number, select, etc)"
          - name: groupName
            type: string
            required: true
            description: "Property group name"
      delete:
        method: DELETE
        path: "/crm/v3/properties/contacts/{propertyName}"
        description: "Delete a contact property"
        params:
          - name: propertyName
            type: string
            required: true
            positional: true
            description: "Property name"

  associations:
    description: "Manage relationships between CRM objects"
    endpoints:
      list:
        method: GET
        path: "/crm/v4/objects/{fromObjectType}/{objectId}/associations/{toObjectType}"
        description: "List associations for an object"
        response_path: "results"
        params:
          - name: fromObjectType
            type: string
            required: true
            positional: true
            description: "Source object type (contacts, companies, deals, tickets)"
          - name: objectId
            type: string
            required: true
            positional: true
            description: "Source object ID"
          - name: toObjectType
            type: string
            required: true
            positional: true
            description: "Target object type"

  lists:
