      update:
        method: PATCH
        path: "/crm/v3/objects/deals/{dealId}"
        description: "Update a deal"
        params:
          - name: dealId
            type: string
            required: true
            positional: true
            description: "Deal ID"
        body:
          - name: dealname
            type: string
            description: "Deal name"
          - name: amount
            type: string
            description: "Deal amount"
          - name: dealstage
