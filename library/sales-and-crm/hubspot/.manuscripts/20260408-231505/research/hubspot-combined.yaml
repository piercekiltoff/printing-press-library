name: hubspot
description: "Manage HubSpot CRM contacts, companies, deals, tickets, engagements, pipelines, and associations"
version: "3.0.0"
base_url: "https://api.hubapi.com"

auth:
  type: bearer_token
  header: "Authorization"
  env_vars:
    - HUBSPOT_ACCESS_TOKEN
    - HUBSPOT_PRIVATE_APP_TOKEN

rate_limit:
  requests_per_second: 11
  burst: 20

pagination:
  style: cursor
  cursor_param: after
  cursor_response_path: paging.next.after
  page_size_param: limit
  default_page_size: 100

resources:
  contacts:
    description: "Manage CRM contacts"
    endpoints:
      list:
        method: GET
        path: "/crm/v3/objects/contacts"
        description: "List contacts"
        response_path: "results"
        params:
          - name: limit
            type: int
            description: "Max contacts to return (default 10, max 100)"
          - name: properties
            type: string
            description: "Comma-separated list of properties to include"
          - name: after
            type: string
            description: "Cursor for pagination"
      get:
        method: GET
        path: "/crm/v3/objects/contacts/{contactId}"
        description: "Get a contact by ID"
        params:
          - name: contactId
            type: string
            required: true
            positional: true
            description: "Contact ID"
          - name: properties
            type: string
            description: "Comma-separated list of properties to include"
      create:
        method: POST
        path: "/crm/v3/objects/contacts"
        description: "Create a new contact"
        body:
          - name: email
            type: string
            required: true
            description: "Email address"
          - name: firstname
            type: string
            description: "First name"
          - name: lastname
            type: string
            description: "Last name"
          - name: phone
            type: string
            description: "Phone number"
          - name: company
            type: string
            description: "Company name"
          - name: jobtitle
            type: string
            description: "Job title"
      update:
        method: PATCH
        path: "/crm/v3/objects/contacts/{contactId}"
        description: "Update a contact"
        params:
          - name: contactId
            type: string
            required: true
            positional: true
            description: "Contact ID"
        body:
          - name: email
            type: string
            description: "Email address"
          - name: firstname
            type: string
            description: "First name"
          - name: lastname
            type: string
            description: "Last name"
          - name: phone
            type: string
            description: "Phone number"
      delete:
        method: DELETE
        path: "/crm/v3/objects/contacts/{contactId}"
        description: "Delete (archive) a contact"
        params:
          - name: contactId
            type: string
            required: true
            positional: true
            description: "Contact ID"
      search:
        method: POST
        path: "/crm/v3/objects/contacts/search"
        description: "Search contacts"
        response_path: "results"
        body:
          - name: query
            type: string
            description: "Search query string"
          - name: limit
            type: int
            description: "Max results"

