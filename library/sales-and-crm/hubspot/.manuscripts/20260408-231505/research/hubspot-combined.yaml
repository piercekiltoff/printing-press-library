            type: string
            required: true
            positional: true
            description: "Company ID"
        body:
          - name: name
            type: string
            description: "Company name"
          - name: domain
            type: string
            description: "Company domain"
      delete:
        method: DELETE
        path: "/crm/v3/objects/companies/{companyId}"
        description: "Delete (archive) a company"
        params:
          - name: companyId
            type: string
            required: true
            positional: true
            description: "Company ID"
      search:
        method: POST
        path: "/crm/v3/objects/companies/search"
        description: "Search companies"
        response_path: "results"
        body:
          - name: query
