        path: "/crm/v3/objects/emails/{emailId}"
        description: "Get an email by ID"
        params:
          - name: emailId
            type: string
            required: true
            positional: true
            description: "Email ID"
      create:
        method: POST
        path: "/crm/v3/objects/emails"
        description: "Log an email"
        body:
          - name: hs_email_subject
            type: string
