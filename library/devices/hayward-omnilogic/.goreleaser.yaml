version: 2
project_name: hayward-omnilogic-pp-cli
changelog:
  disable: true
builds:
  - id: hayward-omnilogic-pp-cli
    main: ./cmd/hayward-omnilogic-pp-cli
    binary: hayward-omnilogic-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/devices/hayward-omnilogic/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: hayward-omnilogic-pp-mcp
    main: ./cmd/hayward-omnilogic-pp-mcp
    binary: hayward-omnilogic-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: hayward-omnilogic-pp-cli
    repository:
      owner: rzehner
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Take control of every Hayward OmniLogic feature, plus a local store, schedule diffs, chemistry trends, and a morning..."
    install: |
      bin.install "hayward-omnilogic-pp-cli"
      bin.install "hayward-omnilogic-pp-mcp"
