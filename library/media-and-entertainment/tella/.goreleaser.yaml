version: 2
project_name: tella-pp-cli
changelog:
  disable: true
builds:
  - id: tella-pp-cli
    main: ./cmd/tella-pp-cli
    binary: tella-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/tella/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: tella-pp-mcp
    main: ./cmd/tella-pp-mcp
    binary: tella-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: tella-pp-cli
    repository:
      owner: gregce
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Tella API operation behind one CLI, with a local SQLite store, FTS5 transcript search, and webhook tooling..."
    install: |
      bin.install "tella-pp-cli"
      bin.install "tella-pp-mcp"
