name: hackernews
description: "Hacker News from your terminal — browse, search, and analyze developer news with multi-source ratings and pipe-friendly output"
version: "1.0.0"
base_url: "https://hacker-news.firebaseio.com/v0"
website_url: "https://news.ycombinator.com"
category: "media-and-entertainment"

auth:
  type: none

config:
  format: toml
  path: "~/.config/hackernews-pp-cli/config.toml"

resources:
  stories:
    description: "Browse and search HN stories"
    endpoints:
      top:
        method: GET
        path: "/topstories.json"
        description: "Get the current top stories on Hacker News"
        params:
          - name: limit
            type: int
            description: "Maximum number of stories to return (default 30)"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      new:
        method: GET
        path: "/newstories.json"
        description: "Get the newest stories on Hacker News"
        params:
          - name: limit
            type: int
            description: "Maximum number of stories to return"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      best:
        method: GET
        path: "/beststories.json"
        description: "Get the highest-voted stories on Hacker News"
        params:
          - name: limit
            type: int
            description: "Maximum number of stories to return"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

      get:
        method: GET
        path: "/item/{storyId}.json"
        description: "Get details for a specific story, comment, or item"
        params:
          - name: storyId
            type: string
            required: true
            positional: true
            description: "HN item ID"
        response:
          type: object
          item: Item
        no_auth: true

  ask:
    description: "Browse Ask HN discussions"
    endpoints:
      list:
        method: GET
        path: "/askstories.json"
        description: "Get the latest Ask HN posts"
        params:
          - name: limit
            type: int
            description: "Maximum number to return"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

  show:
    description: "Browse Show HN launches"
    endpoints:
      list:
        method: GET
        path: "/showstories.json"
        description: "Get the latest Show HN posts"
        params:
          - name: limit
            type: int
            description: "Maximum number to return"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

  jobs:
    description: "Browse HN job postings"
    endpoints:
      list:
        method: GET
        path: "/jobstories.json"
        description: "Get the latest job postings on Hacker News"
        params:
          - name: limit
            type: int
            description: "Maximum number to return"
            default: 30
        response:
          type: array
          item: StoryID
        no_auth: true

  users:
    description: "Look up HN user profiles"
    endpoints:
      get:
        method: GET
        path: "/user/{userId}.json"
        description: "Get a user's profile including karma and submission history"
        params:
          - name: userId
            type: string
            required: true
            positional: true
            description: "HN username"
        response:
          type: object
          item: User
        no_auth: true

  search:
    description: "Search HN stories and comments via Algolia"
    endpoints:
      query:
        method: GET
        path: "/search"
        description: "Search Hacker News stories and comments by keyword"
        params:
          - name: query
            type: string
            required: true
            positional: true
            description: "Search query"
          - name: tags
            type: string
            description: "Filter by type: story, comment, ask_hn, show_hn, job, poll, author_USERNAME"
          - name: numericFilters
            type: string
            description: "Numeric filters like created_at_i>TIMESTAMP, points>N, num_comments>N"
          - name: page
            type: int
            description: "Page number (0-indexed)"
          - name: hitsPerPage
            type: int
            description: "Results per page (default 20, max 100)"
            default: 20
        response:
          type: array
          item: SearchHit
        response_path: "hits"
        no_auth: true

      by-date:
        method: GET
        path: "/search_by_date"
        description: "Search Hacker News sorted by date (most recent first)"
        params:
          - name: query
            type: string
            required: true
            positional: true
            description: "Search query"
          - name: tags
            type: string
            description: "Filter by type: story, comment, ask_hn, show_hn, job"
          - name: numericFilters
            type: string
            description: "Numeric filters"
          - name: page
            type: int
            description: "Page number"
          - name: hitsPerPage
            type: int
            description: "Results per page"
            default: 20
        response:
          type: array
          item: SearchHit
        response_path: "hits"
        no_auth: true

types:
  StoryID:
    fields:
      - name: id
        type: int

  Item:
    fields:
      - name: id
        type: int
      - name: type
        type: string
      - name: by
        type: string
      - name: time
        type: int
      - name: title
        type: string
      - name: url
        type: string
      - name: score
        type: int
      - name: descendants
        type: int
      - name: text
        type: string
      - name: kids
        type: "[]int"

  User:
    fields:
      - name: id
        type: string
      - name: karma
        type: int
      - name: about
        type: string
      - name: created
        type: int
      - name: submitted
        type: "[]int"

  SearchHit:
    fields:
      - name: objectID
        type: string
      - name: title
        type: string
      - name: url
        type: string
      - name: author
        type: string
      - name: points
        type: int
      - name: num_comments
        type: int
      - name: created_at
        type: string
      - name: story_text
        type: string
