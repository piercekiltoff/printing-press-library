version: 2
project_name: hackernews-pp-cli
changelog:
  disable: true
builds:
  - id: hackernews-pp-cli
    main: ./cmd/hackernews-pp-cli
    binary: hackernews-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/hackernews/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: hackernews-pp-mcp
    main: ./cmd/hackernews-pp-mcp
    binary: hackernews-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: hackernews-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Hacker News from your terminal — with a local store, full-text search, and agent-native output no other HN tool has"
    install: |
      bin.install "hackernews-pp-cli"
      bin.install "hackernews-pp-mcp"
