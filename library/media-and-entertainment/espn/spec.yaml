name: espn
description: "ESPN Sports API CLI — scores, standings, news, and game data across 17 sports and 139 leagues"
version: "0.1.0"
base_url: "https://site.api.espn.com/apis/site/v2/sports"

auth:
  type: none

config:
  format: toml
  path: "~/.config/espn-pp-cli/config.toml"

resources:
  scoreboard:
    description: "Live and historical game scores"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/scoreboard"
        description: "Get scoreboard for a sport and league with optional date filtering"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug (football, basketball, baseball, hockey, soccer)"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug (nfl, nba, mlb, nhl, college-football, mens-college-basketball)"
          - name: dates
            type: string
            description: "Date or date range in YYYYMMDD or YYYYMMDD-YYYYMMDD format"
          - name: limit
            type: int
            default: 100
            description: "Maximum number of events to return"
          - name: groups
            type: int
            description: "Group filter for division games (use 50 for all Division I)"
        response:
          type: object
          item: Scoreboard

  teams:
    description: "Team information across all leagues"
    endpoints:
      list:
        method: GET
        path: "/{sport}/{league}/teams"
        description: "List all teams in a league"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: limit
            type: int
            default: 100
            description: "Maximum number of teams"
        response:
          type: object
          item: TeamsResponse

      get:
        method: GET
        path: "/{sport}/{league}/teams/{team_id}"
        description: "Get details for a specific team including record, links, and logos"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: team_id
            type: string
            required: true
            positional: true
            description: "Team ID number"
        response:
          type: object
          item: Team

      schedule:
        method: GET
        path: "/{sport}/{league}/teams/{team_id}/schedule"
        description: "Get past and upcoming schedule for a specific team"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: team_id
            type: string
            required: true
            positional: true
            description: "Team ID number"
          - name: season
            type: int
            description: "Season year (e.g. 2025)"
        response:
          type: object
          item: Schedule

  news:
    description: "Latest sports news and headlines"
    endpoints:
      list:
        method: GET
        path: "/{sport}/{league}/news"
        description: "Get latest news articles for a sport and league"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: limit
            type: int
            default: 25
            description: "Maximum number of articles to return"
        response:
          type: object
          item: NewsResponse

  summary:
    description: "Game summaries with box scores, play-by-play, and statistics"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/summary"
        description: "Get detailed game summary including box score, leaders, scoring plays, odds, and win probability"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: event
            type: string
            required: true
            description: "ESPN event or game ID"
        response:
          type: object
          item: GameSummary

  rankings:
    description: "College sports rankings and polls"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/rankings"
        description: "Get current AP, Coaches, and CFP poll rankings for college sports"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug (football or basketball)"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug (college-football, mens-college-basketball, womens-college-basketball)"
        response:
          type: object
          item: Rankings

types:
  Scoreboard:
    fields:
      - name: events
        type: string
      - name: leagues
        type: string
      - name: season
        type: string
      - name: week
        type: string

  TeamsResponse:
    fields:
      - name: sports
        type: string

  Team:
    fields:
      - name: id
        type: string
      - name: uid
        type: string
      - name: displayName
        type: string
      - name: abbreviation
        type: string
      - name: location
        type: string
      - name: name
        type: string
      - name: color
        type: string
      - name: isActive
        type: bool

  Schedule:
    fields:
      - name: events
        type: string
      - name: team
        type: string
      - name: season
        type: string

  NewsResponse:
    fields:
      - name: header
        type: string
      - name: articles
        type: string

  GameSummary:
    fields:
      - name: boxscore
        type: string
      - name: gameInfo
        type: string
      - name: leaders
        type: string
      - name: scoringPlays
        type: string
      - name: winprobability
        type: string
      - name: odds
        type: string
      - name: header
        type: string

  Rankings:
    fields:
      - name: rankings
        type: string
      - name: sports
        type: string
