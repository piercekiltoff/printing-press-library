version: 2
project_name: espn-pp-cli
changelog:
  disable: true
builds:
  - id: espn-pp-cli
    main: ./cmd/espn-pp-cli
    binary: espn-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/espn/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: espn-pp-mcp
    main: ./cmd/espn-pp-mcp
    binary: espn-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: espn-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "ESPN Sports API CLI — scores, standings, news, and game data across 17 sports and 139 leagues"
    install: |
      bin.install "espn-pp-cli"
      bin.install "espn-pp-mcp"
