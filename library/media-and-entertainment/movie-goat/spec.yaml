name: movie
description: "The movie goat CLI — search, discover, and track movies and TV shows using TMDb and OMDb"
version: "1.0.0"
base_url: "https://api.themoviedb.org/3"
website_url: "https://www.themoviedb.org"
category: "media-and-entertainment"

auth:
  type: bearer_token
  header: "Authorization"
  format: "Bearer %s"
  env_vars:
    - TMDB_API_KEY
  key_url: "https://www.themoviedb.org/settings/api"

config:
  format: toml
  path: "~/.config/movie-goat-pp-cli/config.toml"

resources:
  movies:
    description: "Search and browse movies"
    endpoints:
      search:
        method: GET
        path: "/search/movie"
        description: "Search for movies by title"
        params:
          - name: query
            type: string
            required: true
            positional: true
            description: "Movie title to search for"
          - name: year
            type: int
            description: "Filter by release year"
          - name: page
            type: int
            description: "Page number (default 1)"
          - name: language
            type: string
            description: "Language code (e.g. en-US)"
        response:
          type: array
          item: Movie
        response_path: "results"
        pagination:
          type: offset
          limit_param: "page"
          cursor_param: "page"

      get:
        method: GET
        path: "/movie/{movieId}"
        description: "Get detailed info about a movie including cast, ratings, and streaming availability"
        params:
          - name: movieId
            type: string
            required: true
            positional: true
            description: "TMDb movie ID or IMDb ID (tt...)"
          - name: append_to_response
            type: string
            description: "Additional data to include (credits,watch/providers,videos,recommendations,similar,external_ids)"
            default: "credits,watch/providers,videos,recommendations,external_ids"
        response:
          type: object
          item: MovieDetail

      popular:
        method: GET
        path: "/movie/popular"
        description: "Get current popular movies"
        params:
          - name: page
            type: int
            description: "Page number"
          - name: language
            type: string
            description: "Language code"
          - name: region
            type: string
            description: "ISO 3166-1 country code"
        response:
          type: array
          item: Movie
        response_path: "results"

      top-rated:
        method: GET
        path: "/movie/top_rated"
        description: "Get the highest rated movies"
        params:
          - name: page
            type: int
            description: "Page number"
          - name: language
            type: string
            description: "Language code"
          - name: region
            type: string
            description: "ISO 3166-1 country code"
        response:
          type: array
          item: Movie
        response_path: "results"

      upcoming:
        method: GET
        path: "/movie/upcoming"
        description: "Get movies coming soon to theaters"
        params:
          - name: page
            type: int
            description: "Page number"
          - name: language
            type: string
            description: "Language code"
          - name: region
            type: string
            description: "ISO 3166-1 country code"
        response:
          type: array
          item: Movie
        response_path: "results"

      now-playing:
        method: GET
        path: "/movie/now_playing"
        description: "Get movies currently in theaters"
        params:
          - name: page
            type: int
            description: "Page number"
          - name: language
            type: string
            description: "Language code"
          - name: region
            type: string
            description: "ISO 3166-1 country code"
        response:
          type: array
          item: Movie
        response_path: "results"

  tv:
    description: "Search and browse TV shows"
    endpoints:
      search:
        method: GET
        path: "/search/tv"
        description: "Search for TV shows by title"
        params:
          - name: query
            type: string
            required: true
            positional: true
            description: "TV show title to search for"
          - name: year
            type: int
            description: "Filter by first air date year"
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TVShow
        response_path: "results"

      get:
        method: GET
        path: "/tv/{seriesId}"
        description: "Get detailed info about a TV show"
        params:
          - name: seriesId
            type: string
            required: true
            positional: true
            description: "TMDb TV show ID"
          - name: append_to_response
            type: string
            description: "Additional data to include"
            default: "credits,watch/providers,videos,recommendations,external_ids"
        response:
          type: object
          item: TVShowDetail

      popular:
        method: GET
        path: "/tv/popular"
        description: "Get current popular TV shows"
        params:
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TVShow
        response_path: "results"

      top-rated:
        method: GET
        path: "/tv/top_rated"
        description: "Get the highest rated TV shows"
        params:
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TVShow
        response_path: "results"

      on-the-air:
        method: GET
        path: "/tv/on_the_air"
        description: "Get TV shows currently on the air"
        params:
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TVShow
        response_path: "results"

      airing-today:
        method: GET
        path: "/tv/airing_today"
        description: "Get TV shows with episodes airing today"
        params:
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TVShow
        response_path: "results"

    sub_resources:
      seasons:
        description: "TV show season and episode details"
        endpoints:
          get:
            method: GET
            path: "/tv/{seriesId}/season/{seasonNumber}"
            description: "Get details for a specific season including all episodes"
            params:
              - name: seriesId
                type: string
                required: true
                positional: true
                description: "TMDb TV show ID"
              - name: seasonNumber
                type: int
                required: true
                positional: true
                description: "Season number"
            response:
              type: object
              item: Season

  people:
    description: "Search and browse people (actors, directors, crew)"
    endpoints:
      search:
        method: GET
        path: "/search/person"
        description: "Search for people by name"
        params:
          - name: query
            type: string
            required: true
            positional: true
            description: "Person name to search for"
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: Person
        response_path: "results"

      get:
        method: GET
        path: "/person/{personId}"
        description: "Get detailed info about a person including their filmography"
        params:
          - name: personId
            type: string
            required: true
            positional: true
            description: "TMDb person ID"
          - name: append_to_response
            type: string
            description: "Additional data to include"
            default: "combined_credits,external_ids"
        response:
          type: object
          item: PersonDetail

      popular:
        method: GET
        path: "/person/popular"
        description: "Get popular people in entertainment"
        params:
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: Person
        response_path: "results"

  discover:
    description: "Discover movies and TV shows with rich filters"
    endpoints:
      movies:
        method: GET
        path: "/discover/movie"
        description: "Discover movies by genre, year, rating, certification, cast, crew, streaming provider, and more"
        params:
          - name: with_genres
            type: string
            description: "Genre IDs (comma-separated, e.g. 28,12 for Action,Adventure)"
          - name: primary_release_year
            type: int
            description: "Exact release year"
          - name: "primary_release_date.gte"
            type: string
            description: "Release date from (YYYY-MM-DD)"
          - name: "primary_release_date.lte"
            type: string
            description: "Release date to (YYYY-MM-DD)"
          - name: "vote_average.gte"
            type: float
            description: "Minimum rating (0-10)"
          - name: "vote_average.lte"
            type: float
            description: "Maximum rating"
          - name: "vote_count.gte"
            type: int
            description: "Minimum number of votes"
          - name: sort_by
            type: string
            description: "Sort order (popularity.desc, vote_average.desc, release_date.desc, revenue.desc)"
            default: "popularity.desc"
          - name: with_watch_providers
            type: string
            description: "Watch provider IDs (comma-separated)"
          - name: watch_region
            type: string
            description: "Region for watch providers (ISO 3166-1, e.g. US)"
          - name: with_cast
            type: string
            description: "Person IDs to filter by cast"
          - name: with_crew
            type: string
            description: "Person IDs to filter by crew"
          - name: with_keywords
            type: string
            description: "Keyword IDs"
          - name: certification
            type: string
            description: "Certification rating (G, PG, PG-13, R)"
          - name: certification_country
            type: string
            description: "Country for certification"
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: Movie
        response_path: "results"

      tv:
        method: GET
        path: "/discover/tv"
        description: "Discover TV shows by genre, year, rating, network, and streaming provider"
        params:
          - name: with_genres
            type: string
            description: "Genre IDs (comma-separated)"
          - name: first_air_date_year
            type: int
            description: "First air date year"
          - name: "vote_average.gte"
            type: float
            description: "Minimum rating"
          - name: "vote_count.gte"
            type: int
            description: "Minimum number of votes"
          - name: sort_by
            type: string
            description: "Sort order"
            default: "popularity.desc"
          - name: with_watch_providers
            type: string
            description: "Watch provider IDs"
          - name: watch_region
            type: string
            description: "Region for watch providers"
          - name: with_networks
            type: string
            description: "Network IDs (e.g. Netflix, HBO)"
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TVShow
        response_path: "results"

  trending:
    description: "Get trending movies, TV shows, and people"
    endpoints:
      all:
        method: GET
        path: "/trending/all/{timeWindow}"
        description: "Get trending movies, TV, and people"
        params:
          - name: timeWindow
            type: string
            required: true
            description: "Time window: day or week"
            default: "day"
            enum:
              - day
              - week
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TrendingItem
        response_path: "results"

      movies:
        method: GET
        path: "/trending/movie/{timeWindow}"
        description: "Get trending movies"
        params:
          - name: timeWindow
            type: string
            required: true
            description: "Time window: day or week"
            default: "day"
            enum:
              - day
              - week
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: Movie
        response_path: "results"

      tv:
        method: GET
        path: "/trending/tv/{timeWindow}"
        description: "Get trending TV shows"
        params:
          - name: timeWindow
            type: string
            required: true
            description: "Time window: day or week"
            default: "day"
            enum:
              - day
              - week
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: TVShow
        response_path: "results"

      people:
        method: GET
        path: "/trending/person/{timeWindow}"
        description: "Get trending people"
        params:
          - name: timeWindow
            type: string
            required: true
            description: "Time window: day or week"
            default: "day"
            enum:
              - day
              - week
        response:
          type: array
          item: Person
        response_path: "results"

  genres:
    description: "Get genre lists for movies and TV"
    endpoints:
      movies:
        method: GET
        path: "/genre/movie/list"
        description: "Get the list of movie genres"
        response:
          type: array
          item: Genre
        response_path: "genres"

      tv:
        method: GET
        path: "/genre/tv/list"
        description: "Get the list of TV genres"
        response:
          type: array
          item: Genre
        response_path: "genres"

  search:
    description: "Multi-search across movies, TV shows, and people"
    endpoints:
      multi:
        method: GET
        path: "/search/multi"
        description: "Search for movies, TV shows, and people in a single query"
        params:
          - name: query
            type: string
            required: true
            positional: true
            description: "Search query"
          - name: page
            type: int
            description: "Page number"
        response:
          type: array
          item: SearchResult
        response_path: "results"

types:
  Movie:
    fields:
      - name: id
        type: int
      - name: title
        type: string
      - name: release_date
        type: string
      - name: vote_average
        type: float
      - name: vote_count
        type: int
      - name: overview
        type: string
      - name: genre_ids
        type: "[]int"
      - name: popularity
        type: float
      - name: poster_path
        type: string

  MovieDetail:
    fields:
      - name: id
        type: int
      - name: imdb_id
        type: string
      - name: title
        type: string
      - name: release_date
        type: string
      - name: vote_average
        type: float
      - name: vote_count
        type: int
      - name: overview
        type: string
      - name: runtime
        type: int
      - name: budget
        type: int
      - name: revenue
        type: int
      - name: status
        type: string
      - name: tagline
        type: string
      - name: genres
        type: "[]Genre"
      - name: poster_path
        type: string
      - name: backdrop_path
        type: string

  TVShow:
    fields:
      - name: id
        type: int
      - name: name
        type: string
      - name: first_air_date
        type: string
      - name: vote_average
        type: float
      - name: vote_count
        type: int
      - name: overview
        type: string
      - name: genre_ids
        type: "[]int"
      - name: popularity
        type: float

  TVShowDetail:
    fields:
      - name: id
        type: int
      - name: name
        type: string
      - name: first_air_date
        type: string
      - name: vote_average
        type: float
      - name: vote_count
        type: int
      - name: overview
        type: string
      - name: number_of_seasons
        type: int
      - name: number_of_episodes
        type: int
      - name: status
        type: string
      - name: type
        type: string
      - name: genres
        type: "[]Genre"

  Person:
    fields:
      - name: id
        type: int
      - name: name
        type: string
      - name: known_for_department
        type: string
      - name: popularity
        type: float

  PersonDetail:
    fields:
      - name: id
        type: int
      - name: name
        type: string
      - name: biography
        type: string
      - name: birthday
        type: string
      - name: deathday
        type: string
      - name: place_of_birth
        type: string
      - name: known_for_department
        type: string
      - name: popularity
        type: float

  Season:
    fields:
      - name: id
        type: int
      - name: name
        type: string
      - name: season_number
        type: int
      - name: episode_count
        type: int
      - name: air_date
        type: string
      - name: overview
        type: string

  Genre:
    fields:
      - name: id
        type: int
      - name: name
        type: string

  TrendingItem:
    fields:
      - name: id
        type: int
      - name: media_type
        type: string
      - name: title
        type: string
      - name: name
        type: string
      - name: vote_average
        type: float
      - name: popularity
        type: float

  SearchResult:
    fields:
      - name: id
        type: int
      - name: media_type
        type: string
      - name: title
        type: string
      - name: name
        type: string
      - name: vote_average
        type: float
