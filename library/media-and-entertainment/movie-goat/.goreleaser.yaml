version: 2
project_name: movie-goat-pp-cli
changelog:
  disable: true
builds:
  - id: movie-goat-pp-cli
    main: ./cmd/movie-goat-pp-cli
    binary: movie-goat-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/movie-goat/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: movie-goat-pp-mcp
    main: ./cmd/movie-goat-pp-mcp
    binary: movie-goat-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: movie-goat-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The movie goat CLI — search, discover, and track movies and TV shows using TMDb and OMDb"
    install: |
      bin.install "movie-goat-pp-cli"
      bin.install "movie-goat-pp-mcp"
