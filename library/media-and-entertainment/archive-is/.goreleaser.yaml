version: 2
project_name: archive-is-pp-cli
changelog:
  disable: true
builds:
  - id: archive-is-pp-cli
    main: ./cmd/archive-is-pp-cli
    binary: archive-is-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/archive-is/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: archive-is-pp-mcp
    main: ./cmd/archive-is-pp-mcp
    binary: archive-is-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: archive-is-pp-cli
    repository:
      owner: matt-van-horn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Archive.is CLI - paywall bypass and web archive lookup via the archive.today / archive.ph service"
    install: |
      bin.install "archive-is-pp-cli"
      bin.install "archive-is-pp-mcp"
