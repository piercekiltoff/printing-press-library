name: producthunt
description: "Token-free Product Hunt CLI — browse today's featured launches, sync locally, and compose views the website itself doesn't expose."
version: "0.1.0"
kind: synthetic
base_url: "https://www.producthunt.com"

auth:
  type: none

config:
  format: toml
  path: "~/.config/producthunt-pp-cli/config.toml"

resources:
  feed:
    description: "Public Atom feed of featured Product Hunt launches"
    endpoints:
      get:
        method: GET
        path: "/feed"
        description: "Fetch the 50-entry public Atom feed of recent featured launches"
        response:
          type: text
          item: string
