version: 2
project_name: producthunt-pp-cli
changelog:
  disable: true
builds:
  - id: producthunt-pp-cli
    main: ./cmd/producthunt-pp-cli
    binary: producthunt-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/producthunt/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: producthunt-pp-mcp
    main: ./cmd/producthunt-pp-mcp
    binary: producthunt-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: producthunt-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Token-free Product Hunt CLI — browse today's featured launches, sync locally, and compose views the website itself doesn't expose."
    install: |
      bin.install "producthunt-pp-cli"
      bin.install "producthunt-pp-mcp"
