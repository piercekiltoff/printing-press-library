version: 2
project_name: customer-io-pp-cli
changelog:
  disable: true
builds:
  - id: customer-io-pp-cli
    main: ./cmd/customer-io-pp-cli
    binary: customer-io-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/customer-io/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: customer-io-pp-mcp
    main: ./cmd/customer-io-pp-mcp
    binary: customer-io-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: customer-io-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Customer.io CLI — every action a marketer or ops engineer takes, with named verbs, a local SQLite cache, and a bundled MCP server."
    install: |
      bin.install "customer-io-pp-cli"
      bin.install "customer-io-pp-mcp"
