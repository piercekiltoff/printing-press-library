version: 2
project_name: flight-goat-pp-cli
changelog:
  disable: true
builds:
  - id: flight-goat-pp-cli
    main: ./cmd/flight-goat-pp-cli
    binary: flight-goat-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X flight-goat-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: flight-goat-pp-mcp
    main: ./cmd/flight-goat-pp-mcp
    binary: flight-goat-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: flight-goat-pp-cli
    repository:
      owner: matt-van-horn
      name: homebrew-tap
    homepage: "https://github.com/matt-van-horn/flight-goat-pp-cli"
    description: "Search Google Flights, scan Kayak long-haul routes, and join FlightAware AeroAPI reliability, alerts, and tracking from one CLI."
    install: |
      bin.install "flight-goat-pp-cli"
      bin.install "flight-goat-pp-mcp"
