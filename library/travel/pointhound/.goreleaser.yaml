version: 2
project_name: pointhound-pp-cli
changelog:
  disable: true
builds:
  - id: pointhound-pp-cli
    main: ./cmd/pointhound-pp-cli
    binary: pointhound-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/pointhound/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: pointhound-pp-mcp
    main: ./cmd/pointhound-pp-mcp
    binary: pointhound-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pointhound-pp-cli
    repository:
      owner: salmonumbrella
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Pointhound flight search, plus a local SQLite of every deal you've ever seen, balance-aware reachability, and..."
    install: |
      bin.install "pointhound-pp-cli"
      bin.install "pointhound-pp-mcp"
