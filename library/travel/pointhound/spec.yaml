name: pointhound
display_name: Pointhound
description: "Search award flights and explore credit-card points redemptions on Pointhound."
version: "0.1.0"
base_url: "https://www.pointhound.com"

# Pointhound has no documented public API. This spec models the /api/offers REST
# surface used by the Pointhound web frontend, plus cookie auth so the
# hand-written `search` novel command (which talks to Cloudflare-protected
# /flights search-create) can use imported Chrome session cookies.
#
# All offers/filter-options endpoints work anonymously (no_auth: true). Only
# the hand-written search/account commands require cookies.

auth:
  type: cookie
  cookie_domain: ".pointhound.com"
  cookies:
    - cf_clearance
    - ph_session
  in: header
  header: Cookie

config:
  format: toml
  path: "~/.config/pointhound-pp-cli/config.toml"

resources:
  offers:
    description: "Flight offers returned for a search session"
    endpoints:
      list:
        method: GET
        path: "/api/offers"
        no_auth: true
        description: "List flight offers for an existing search session, with optional filters and sort."
        params:
          - name: searchId
            flag_name: search-id
            type: string
            required: true
            description: "Pointhound search session id (ofs_*). Obtain by visiting a Pointhound search results URL and copying the searchId from the network log, or by running `pointhound-pp-cli search` once cookies are imported."
          - name: take
            type: int
            description: "Maximum number of offers to return (page size)."
          - name: offset
            type: int
            description: "Pagination offset."
          - name: sortBy
            flag_name: sort-by
            type: string
            description: "Sort field: points, duration, or departsAt."
          - name: sortOrder
            flag_name: sort-order
            type: string
            description: "Sort direction: asc or desc."
          - name: cabins
            type: string
            description: "Comma-separated cabin classes to include: economy, premium_economy, business, first."
          - name: passengers
            type: int
            description: "Passenger count (1-9)."
          - name: airlines
            type: string
            description: "Comma-separated airline IDs (aln_* values from filter-options)."
          - name: airlinePrograms
            flag_name: airline-programs
            type: string
            description: "Comma-separated airline frequent flyer program IDs (prp_* values)."
          - name: cardPrograms
            flag_name: card-programs
            type: string
            description: "Comma-separated transferable points program IDs (pep_* values)."
          - name: stops
            type: string
            description: "Comma-separated stop counts to include (0 for nonstop, 1, 2, etc.)."
        response:
          type: object
          item: OfferListResponse

      filter_options:
        method: GET
        path: "/api/offers/filter-options"
        no_auth: true
        description: "Get the filterable facets (card programs, airline programs, airlines) available for a given search session."
        params:
          - name: searchId
            flag_name: search-id
            type: string
            required: true
            description: "Pointhound search session id (ofs_*)."
        response:
          type: object
          item: FilterOptions

types:
  OfferListResponse:
    fields:
      - name: data
        type: array
        description: "Array of offer objects (see Offer)."
      - name: count
        type: int
        description: "Total number of offers in the search session matching filters."

  Offer:
    fields:
      - name: id
        type: string
        description: "Offer ID (off_*)."
      - name: pricePoints
        type: int
        description: "Points required to book this offer."
      - name: bestPricePoints
        type: int
        description: "Lowest equivalent points across alternative redemption paths."
      - name: priceRetailTotal
        type: string
        description: "Cash equivalent total fare (string-encoded decimal)."
      - name: priceRetailCurrency
        type: string
        description: "ISO 4217 currency of the retail price (typically USD)."
      - name: priceRetailTax
        type: string
        description: "Retail tax portion."
      - name: priceRetailBase
        type: string
        description: "Retail base fare portion."
      - name: pricePerPoint
        type: string
        description: "Cents-per-point value of the redemption."
      - name: cabinClass
        type: string
        description: "Cabin class for the entire itinerary."
      - name: originCode
        type: string
        description: "IATA origin airport code."
      - name: destinationCode
        type: string
        description: "IATA destination airport code."
      - name: departsAt
        type: string
        description: "ISO 8601 departure timestamp (UTC)."
      - name: arrivesAt
        type: string
        description: "ISO 8601 arrival timestamp (UTC)."
      - name: departsAtHour
        type: int
        description: "Departure hour in the origin's local time (0-23)."
      - name: arrivesAtHour
        type: int
        description: "Arrival hour in the destination's local time (0-23)."
      - name: totalDuration
        type: int
        description: "Total trip duration in minutes."
      - name: totalStops
        type: int
        description: "Number of intermediate stops (0 = nonstop)."
      - name: airlinesList
        type: string
        description: "Comma-separated IATA airline codes flown on the itinerary."
      - name: flightNumbers
        type: string
        description: "Comma-separated flight numbers."
      - name: quantityRemaining
        type: int
        description: "Award seats remaining at this price (9 = '9+' upper bound)."
      - name: sourceIdentifier
        type: string
        description: "Redeem-program identifier (e.g. united, delta, aeroplan)."
      - name: source
        type: object
        description: "Embedded redeem-program details (Source)."
      - name: offerFlightSegments
        type: array
        description: "Per-leg segment details (Segment[])."
      - name: remoteCreatedAt
        type: string
        description: "When the offer was first observed."
      - name: remoteUpdatedAt
        type: string
        description: "When the offer was last refreshed."

  Source:
    fields:
      - name: id
        type: string
        description: "Source ID (src_*)."
      - name: identifier
        type: string
        description: "Short identifier (e.g. united)."
      - name: name
        type: string
        description: "Display name of the redeem program."
      - name: pointRedeemProgramId
        type: string
        description: "Linked redeem program ID (prp_*)."
      - name: redeemProgram
        type: object
        description: "Embedded redeem program (RedeemProgram)."
      - name: searchUrl
        type: string
        description: "Booking URL for the airline's redemption portal."

  RedeemProgram:
    fields:
      - name: id
        type: string
        description: "Redeem program ID (prp_*)."
      - name: name
        type: string
        description: "Program display name."
      - name: transferOptions
        type: array
        description: "Transfer options into this program from each compatible earn program."

  Segment:
    fields:
      - name: id
        type: string
        description: "Segment ID (seg_*)."
      - name: order
        type: int
        description: "0-indexed position within the offer."
      - name: offerId
        type: string
        description: "Parent offer ID (off_*)."
      - name: duration
        type: int
        description: "Segment duration in minutes."
      - name: departsAt
        type: string
        description: "ISO 8601 segment departure."
      - name: arrivesAt
        type: string
        description: "ISO 8601 segment arrival."
      - name: originCode
        type: string
        description: "Segment origin IATA code."
      - name: destinationCode
        type: string
        description: "Segment destination IATA code."
      - name: cabinClass
        type: string
        description: "Cabin class for this segment."
      - name: airlineCode
        type: string
        description: "Operating airline IATA code."
      - name: aircraftName
        type: string
        description: "Aircraft type (e.g. Boeing 787-8)."
      - name: flightNumber
        type: string
        description: "Operating flight number (e.g. UA2274)."
      - name: departureDate
        type: string
        description: "Departure date in ISO 8601 with timezone."
      - name: airline
        type: object
        description: "Embedded airline details (Airline)."
      - name: originAirport
        type: object
        description: "Embedded origin airport (Airport)."
      - name: destinationAirport
        type: object
        description: "Embedded destination airport (Airport)."

  Airline:
    fields:
      - name: id
        type: string
        description: "Airline ID (aln_*)."
      - name: name
        type: string
        description: "Airline display name."
      - name: iataCode
        type: string
        description: "2-letter IATA airline code."
      - name: logoUrl
        type: string
        description: "Full-color lockup logo URL."
      - name: logoIconUrl
        type: string
        description: "Square icon logo URL."

  Airport:
    fields:
      - name: id
        type: string
        description: "Airport ID (apt_*)."
      - name: name
        type: string
        description: "Airport display name."
      - name: iataCode
        type: string
        description: "3-letter IATA airport code."
      - name: identifier
        type: string
        description: "Pointhound's stable identifier (usually equals iataCode)."
      - name: timezone
        type: string
        description: "IANA timezone (e.g. America/Los_Angeles)."
      - name: municipality
        type: string
        description: "City or municipality of the airport."
      - name: availabilityName
        type: string
        description: "Human-readable city, region label."

  FilterOptions:
    fields:
      - name: cardPrograms
        type: array
        description: "Transferable points programs whose deals appear in this search (PointsProgramRef[])."
      - name: airlinePrograms
        type: array
        description: "Airline frequent-flyer programs that have offers in this search (PointsProgramRef[])."
      - name: airlines
        type: array
        description: "Operating airlines present in this search (AirlineRef[])."

  PointsProgramRef:
    fields:
      - name: id
        type: string
        description: "Program ID (pep_* for earn programs, prp_* for redeem programs)."
      - name: name
        type: string
        description: "Program display name."

  AirlineRef:
    fields:
      - name: id
        type: string
        description: "Airline ID (aln_*)."
      - name: name
        type: string
        description: "Airline display name."
