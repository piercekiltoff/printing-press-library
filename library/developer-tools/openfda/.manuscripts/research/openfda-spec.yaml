            in: search
            field: device_name
          - name: device_class
            flag_name: class
            description: "Device class: 1, 2, or 3"
            in: search
            field: device_class
          - name: medical_specialty
            flag_name: specialty
            description: Medical specialty code
            in: search
            field: medical_specialty_description
          - name: product_code
            flag_name: code
            description: Product code
            in: search
            field: product_code
          - name: regulation_number
            flag_name: regulation
            description: CFR regulation number
            in: search
            field: regulation_number

  device-recalls:
    display_name: Device Recalls
    description: Medical device recall enforcement reports.
    endpoints:
      list:
        method: GET
        path: /device/enforcement.json
        description: Search device recall enforcement reports
        params:
          - name: product_description
            flag_name: product
            description: Product description
            in: search
            field: product_description
          - name: recalling_firm
            flag_name: firm
            description: Recalling firm name
            in: search
            field: recalling_firm
          - name: classification
            flag_name: class
            description: "Recall class: Class I, II, III"
            in: search
            field: classification
          - name: status
            flag_name: status
            description: Recall status
            in: search
            field: status
          - name: product_code
            flag_name: code
            description: Product code
            in: search
            field: product_code
          - name: date_from
            flag_name: from
            description: Start of report date range (YYYYMMDD)
            in: search
            field: report_date
            type: date_range_start
          - name: date_to
            flag_name: to
            description: End of report date range (YYYYMMDD)
            in: search
