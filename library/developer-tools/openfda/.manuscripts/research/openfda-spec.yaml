    description: Substance data from the FDA substance registration system.
    endpoints:
      list:
        method: GET
        path: /other/substance.json
        description: Search substance records
        params:
          - name: substance_name
            flag_name: name
            description: Substance name
            in: search
            field: substance_name

  nsde:
