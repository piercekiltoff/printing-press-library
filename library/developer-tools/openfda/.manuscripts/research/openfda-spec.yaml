            in: search
            field: applicant
          - name: product_code
            flag_name: code
            description: Product code
            in: search
            field: product_code
          - name: decision_code
            flag_name: decision
            description: Decision code (APPR, DENY, etc.)
            in: search
            field: decision_code

  device-recall-detail:
    display_name: Device Recall Actions
    description: Detailed device recall actions addressing defects or health risks.
    endpoints:
      list:
        method: GET
        path: /device/recall.json
        description: Search device recall action details
        params:
          - name: product_description
            flag_name: product
            description: Product description
            in: search
            field: product_description
          - name: recalling_firm
            flag_name: firm
            description: Recalling firm
            in: search
            field: recalling_firm
          - name: root_cause
            flag_name: cause
            description: Root cause description
            in: search
            field: root_cause_description

  device-registration:
    display_name: Registration & Listing
    description: Medical device manufacturing establishment registrations and product listings.
    endpoints:
      list:
        method: GET
        path: /device/registrationlisting.json
        description: Search device registrations and listings
        params:
          - name: establishment_type
            flag_name: type
            description: Establishment type
            in: search
            field: establishment_type
          - name: proprietary_name
            flag_name: name
            description: Proprietary name
            in: search
            field: products.proprietary_name

  device-udi:
    display_name: Unique Device Identifier
    description: Global Unique Device Identification Database (GUDID).
    endpoints:
      list:
        method: GET
        path: /device/udi.json
        description: Search unique device identifiers
        params:
          - name: brand_name
            flag_name: brand
            description: Device brand name
            in: search
            field: brand_name
          - name: company_name
            flag_name: company
            description: Company name
            in: search
            field: company_name
          - name: device_description
            flag_name: description
            description: Device description
            in: search
            field: device_description

  device-covid19:
    display_name: COVID-19 Serology
    description: COVID-19 serological testing evaluation data.
    endpoints:
      list:
        method: GET
        path: /device/covid19serology.json
        description: Search COVID-19 serology test evaluations
        params:
          - name: manufacturer
            flag_name: manufacturer
            description: Test manufacturer
            in: search
            field: manufacturer
          - name: device
            flag_name: device
            description: Test device name
            in: search
            field: device

  food-recalls:
    display_name: Food Recalls
    description: Food product recall enforcement reports.
    endpoints:
      list:
        method: GET
        path: /food/enforcement.json
        description: Search food recall enforcement reports
        params:
          - name: product_description
            flag_name: product
            description: Product description
            in: search
            field: product_description
          - name: recalling_firm
            flag_name: firm
            description: Recalling firm
            in: search
