version: 2
project_name: postman-explore-pp-cli
changelog:
  disable: true
builds:
  - id: postman-explore-pp-cli
    main: ./cmd/postman-explore-pp-cli
    binary: postman-explore-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/postman-explore/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: postman-explore-pp-mcp
    main: ./cmd/postman-explore-pp-mcp
    binary: postman-explore-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: postman-explore-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Undocumented internal API powering the public API discovery surface at
postman.com/explore. All requests funnel through a single proxy endpoint
as POST with body `{service, method, path, body?}`. This spec models the
logical endpoints; the proxy envelope is implemented by the generated
client (client_pattern: proxy-envelope).

No authentication required. Unauthenticated browsing only — this CLI does
not model the authenticated Postman product surface (workspace management,
private API networks, account features). Scope is strictly community
collection / workspace / API / flow discovery on the public network."
    install: |
      bin.install "postman-explore-pp-cli"
      bin.install "postman-explore-pp-mcp"
