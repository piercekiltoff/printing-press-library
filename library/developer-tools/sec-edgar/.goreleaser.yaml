version: 2
project_name: sec-edgar-pp-cli
changelog:
  disable: true
builds:
  - id: sec-edgar-pp-cli
    main: ./cmd/sec-edgar-pp-cli
    binary: sec-edgar-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/sec-edgar/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: sec-edgar-pp-mcp
    main: ./cmd/sec-edgar-pp-mcp
    binary: sec-edgar-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: sec-edgar-pp-cli
    repository:
      owner: chris-drit
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every SEC filing, every XBRL fact, every insider trade — synced into a local SQLite store you can pivot, search,..."
    install: |
      bin.install "sec-edgar-pp-cli"
      bin.install "sec-edgar-pp-mcp"
