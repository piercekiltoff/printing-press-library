version: 2
project_name: nvd-pp-cli
changelog:
  disable: true
builds:
  - id: nvd-pp-cli
    main: ./cmd/nvd-pp-cli
    binary: nvd-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/nvd/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: nvd-pp-mcp
    main: ./cmd/nvd-pp-mcp
    binary: nvd-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: nvd-pp-cli
    repository:
      owner: hiten-shah
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The NVD is the U.S. government repository of standards-based vulnerability management data.
Search CVEs by keyword, product (CPE name), CVE ID, or date range. Get CVSS scores,
affected versions, references, and severity ratings. No API key required (optional for higher rate limits)."
    install: |
      bin.install "nvd-pp-cli"
      bin.install "nvd-pp-mcp"
