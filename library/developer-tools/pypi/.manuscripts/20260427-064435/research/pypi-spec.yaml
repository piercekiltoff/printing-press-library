openapi: "3.0.3"
info:
  title: PyPI
  version: "1.0.0"
  description: |
    PyPI JSON API. Look up Python package metadata, versions, release files,
    and vulnerability data. Browse recent updates and newest packages via RSS feeds.
    No authentication required — all endpoints are public.
servers:
  - url: https://pypi.org
    description: PyPI JSON API
tags:
  - name: packages
    description: Package metadata and release information
  - name: rss
    description: RSS feeds for recent updates and newest packages

paths:
  /pypi/{package}/json:
    get:
      operationId: get-package-info
      summary: Get package info (latest version)
      description: Full metadata for a PyPI package including author, license, classifiers, download URLs, and release history.
      tags: [packages]
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: Package name (e.g. "requests", "flask")
      responses:
        "200":
          description: Package information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageResponse"

  /pypi/{package}/{version}/json:
    get:
      operationId: get-package-version-info
      summary: Get package info for a specific version
      description: Full metadata for a specific version of a PyPI package.
      tags: [packages]
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: Package name
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Version string (e.g. "2.31.0")
      responses:
        "200":
          description: Package version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageResponse"

  /rss/updates.xml:
    get:
      operationId: recent-updates
      summary: Recent package updates
      description: RSS feed of the most recently updated packages on PyPI.
      tags: [rss]
      responses:
        "200":
          description: RSS XML feed
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/RSSFeed"

  /rss/packages.xml:
    get:
      operationId: newest-packages
      summary: Newest packages
      description: RSS feed of the newest packages added to PyPI.
      tags: [rss]
      responses:
        "200":
          description: RSS XML feed
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/RSSFeed"

components:
  schemas:
    PackageResponse:
      type: object
      properties:
        info:
          $ref: "#/components/schemas/PackageInfo"
        urls:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseFile"
        releases:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/ReleaseFile"
        vulnerabilities:
          type: array
          items:
            $ref: "#/components/schemas/Vulnerability"

    PackageInfo:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        summary:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        author_email:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        home_page:
          type: string
          nullable: true
        project_url:
          type: string
          nullable: true
        project_urls:
          type: object
          additionalProperties:
            type: string
          nullable: true
        requires_python:
          type: string
          nullable: true
        classifiers:
          type: array
          items:
            type: string
        keywords:
          type: string
          nullable: true
        bugtrack_url:
          type: string
          nullable: true
        package_url:
          type: string
        release_url:
          type: string
        docs_url:
          type: string
          nullable: true
        downloads:
          type: object
          additionalProperties:
            type: integer
        platform:
          type: string
          nullable: true
        yanked:
          type: boolean
        yanked_reason:
          type: string
          nullable: true

    ReleaseFile:
      type: object
      properties:
        filename:
          type: string
        url:
          type: string
        packagetype:
          type: string
          description: "sdist, bdist_wheel, bdist_egg, etc."
        size:
          type: integer
        md5_digest:
          type: string
        sha256_digest:
          type: string
        uploads_at:
          type: string
          format: date-time
        python_version:
          type: string
        requires_python:
          type: string
          nullable: true
        yanked:
          type: boolean
        yanked_reason:
          type: string
          nullable: true

    Vulnerability:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        link:
          type: string
          nullable: true
        aliases:
          type: array
          items:
            type: string
        summary:
          type: string
          nullable: true
        fixed_in:
          type: array
          items:
            type: string
        details:
          type: string
          nullable: true

    RSSFeed:
      type: object
      properties:
        channel:
          type: object
          properties:
            title:
              type: string
            link:
              type: string
            description:
              type: string
            items:
              type: array
              items:
                $ref: "#/components/schemas/RSSItem"

    RSSItem:
      type: object
      properties:
        title:
          type: string
        link:
          type: string
        description:
          type: string
          nullable: true
        pubDate:
          type: string
        author:
          type: string
          nullable: true
