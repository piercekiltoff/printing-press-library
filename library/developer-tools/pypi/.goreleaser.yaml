version: 2
project_name: pypi-pp-cli
changelog:
  disable: true
builds:
  - id: pypi-pp-cli
    main: ./cmd/pypi-pp-cli
    binary: pypi-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X pypi-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: pypi-pp-mcp
    main: ./cmd/pypi-pp-mcp
    binary: pypi-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pypi-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/trevin-chow/pypi-pp-cli"
    description: "PyPI JSON API. Look up Python package metadata, versions, release files,
and vulnerability data. Browse recent updates and newest packages via RSS feeds.
No authentication required — all endpoints are public."
    install: |
      bin.install "pypi-pp-cli"
      bin.install "pypi-pp-mcp"
