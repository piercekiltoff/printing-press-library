name: company-goat
description: Look up startups across SEC Form D, GitHub, Hacker News, Companies House, YC, Wikidata, and DNS in one command. Built for scouts, founders, BD, and AI agents researching small/midsize startups.
cli_description: One call across seven authoritative sources to research a startup's funding history (SEC Form D), engineering velocity (GitHub), HN mentions, legal entity (US/UK), and domain age. Compares competitors side-by-side and flags inconsistencies between public claims and filings.
version: "0.1.0"
kind: synthetic
spec_source: official
http_transport: standard
website_url: "https://www.sec.gov/edgar"
category: developer-tools
base_url: "https://data.sec.gov"

auth:
  type: none

config:
  format: toml
  path: "~/.config/company-goat-pp-cli/config.toml"

# Nominal resource so the generator emits scaffolding. Every real command
# is declared in extra_commands and hand-built in Phase 3 against
# per-source clients (sec-edgar, github, hn-algolia, companies-house, yc,
# wikidata, rdap).
resources:
  filings:
    description: "SEC EDGAR Form D filings — the primary data source for US private fundraising disclosure"
    endpoints:
      list:
        method: GET
        path: "/submissions/CIK{cik}.json"
        description: "Fetch all SEC submissions for a given CIK (Central Index Key). Used as the seed call when resolving a company's filing history."
        params:
          - name: cik
            in: path
            type: string
            required: true
            description: "10-digit zero-padded SEC Central Index Key (e.g., 0001318605 for Tesla)"
        response:
          type: object
          item: object

extra_commands:
  # Resolution & disambiguation
  - name: resolve
    args: "<name-or-domain>"
    description: "Resolve a company name to a canonical domain. Returns numbered candidates if ambiguous; --pick N or --domain to disambiguate."

  # Per-source per-company lookups (Priority 1)
  - name: funding
    args: "<co>"
    description: "SEC EDGAR Form D filings + YC batch lookup. Shows offering amount, filing date, exemption claimed, related entities — the killer feature."
  - name: engineering
    args: "<co>"
    description: "GitHub org metadata: repo count, contributor count, commit cadence, top languages."
  - name: launches
    args: "<co>"
    description: "Show HN posts about this company, sorted by points. Includes launch year for spotting dead vs. active launches."
  - name: mentions
    args: "<co>"
    description: "Hacker News mention timeline: monthly histogram of mentions over time via Algolia full-text search."
  - name: legal
    args: "<co>"
    description: "Legal entity lookup. UK via Companies House (optional COMPANIES_HOUSE_API_KEY); US via SEC EDGAR Form D issuer fields. Coverage labeled in output."
  - name: yc
    args: "<co>"
    description: "Y Combinator directory entry if the company was YC-backed: batch, status, location, description."
  - name: wiki
    args: "<co>"
    description: "Wikidata company facts: founded date, founders, HQ, industry, key people. Sparse on early-stage startups."
  - name: domain
    args: "<co>"
    description: "Domain age via RDAP/WHOIS, DNS records, and CNAME-based hosting hint (Vercel/Netlify/Heroku/Cloudflare Pages/AWS/GCP)."

  # Compound / transcendence (Priority 2)
  - name: snapshot
    args: "<co>"
    description: "Fan out across all 7 sources in parallel and render a unified summary. The headline command. Uses cliutil.FanoutRun for source-order output and per-source error capture."
  - name: compare
    args: "<a> <b>"
    description: "Two snapshots side-by-side, aligned by section. For evaluating which of two startups looks healthier."
  - name: search
    args: "<query>"
    description: "FTS5 search across the local synced company set. Find companies you've previously researched by industry, location, or any text in the snapshot."
  - name: signal
    args: "<co>"
    description: "Cross-source consistency check. Flags suspicious patterns like 'raised in 2024 but no GitHub commits since 2022'. Lets the user judge."
  - name: funding-trend
    args: "<co>"
    description: "Time series of Form D filings over time. Useful for charting a startup's fundraising cadence."

  # Sync / store
  - name: sync
    args: "<co>"
    description: "Pull from all sources and persist to local SQLite. Subsequent reads can use --data-source local to query offline."
