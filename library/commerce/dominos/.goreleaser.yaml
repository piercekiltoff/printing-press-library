version: 2
project_name: dominos-pp-cli
changelog:
  disable: true
builds:
  - id: dominos-pp-cli
    main: ./cmd/dominos-pp-cli
    binary: dominos-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/dominos/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: dominos-pp-mcp
    main: ./cmd/dominos-pp-mcp
    binary: dominos-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: dominos-pp-cli
    repository:
      owner: matt-van-horn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Domino's Pizza CLI - order pizza, browse menus, track orders, and manage rewards from the terminal"
    install: |
      bin.install "dominos-pp-cli"
      bin.install "dominos-pp-mcp"
