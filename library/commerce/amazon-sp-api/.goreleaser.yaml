version: 2
project_name: amazon-sp-api-pp-cli
changelog:
  disable: true
builds:
  - id: amazon-sp-api-pp-cli
    main: ./cmd/amazon-sp-api-pp-cli
    binary: amazon-sp-api-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/amazon-sp-api/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: amazon-sp-api-pp-mcp
    main: ./cmd/amazon-sp-api-pp-mcp
    binary: amazon-sp-api-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: amazon-sp-api-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/user/amazon-sp-api-pp-cli"
    description: "Read FBA inventory, orders, sales reports, listings, and catalog data for an Amazon seller account."
    install: |
      bin.install "amazon-sp-api-pp-cli"
      bin.install "amazon-sp-api-pp-mcp"
