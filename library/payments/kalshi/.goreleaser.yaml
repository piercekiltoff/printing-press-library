version: 2
project_name: kalshi-pp-cli
changelog:
  disable: true
builds:
  - id: kalshi-pp-cli
    main: ./cmd/kalshi-pp-cli
    binary: kalshi-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/payments/kalshi/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: kalshi-trade-manual-pp-mcp
    main: ./cmd/kalshi-trade-manual-pp-mcp
    binary: kalshi-trade-manual-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: kalshi-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Manually defined OpenAPI spec for endpoints being migrated to spec-first approach"
    install: |
      bin.install "kalshi-pp-cli"
      bin.install "kalshi-trade-manual-pp-mcp"
