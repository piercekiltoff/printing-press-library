version: 2
project_name: pushover-pp-cli
changelog:
  disable: true
builds:
  - id: pushover-pp-cli
    main: ./cmd/pushover-pp-cli
    binary: pushover-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/social-and-messaging/pushover/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: pushover-pp-mcp
    main: ./cmd/pushover-pp-mcp
    binary: pushover-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pushover-pp-cli
    repository:
      owner: twidtwid
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Pushover from the terminal: send alerts, watch emergency receipts, inspect quota, and keep a redacted local..."
    install: |
      bin.install "pushover-pp-cli"
      bin.install "pushover-pp-mcp"
