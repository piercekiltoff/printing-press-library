version: 2
project_name: twilio-pp-cli
changelog:
  disable: true
builds:
  - id: twilio-pp-cli
    main: ./cmd/twilio-pp-cli
    binary: twilio-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/social-and-messaging/twilio/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: twilio-pp-mcp
    main: ./cmd/twilio-pp-mcp
    binary: twilio-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: twilio-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Twilio Core feature, plus offline message and call history, FTS, and SQL-grade analytics no other Twilio tool..."
    install: |
      bin.install "twilio-pp-cli"
      bin.install "twilio-pp-mcp"
