name: allrecipes
description: "Allrecipes Pocket — every Allrecipes recipe in your terminal: cached as data, with pantry-aware search, Bayesian-smoothed ranking, multi-recipe grocery lists, and clean markdown export."
version: "0.1.0"
kind: synthetic
spec_source: community
http_transport: browser-chrome
website_url: "https://www.allrecipes.com"
category: food-and-dining
base_url: "https://www.allrecipes.com"
cli_description: "Search and fetch Allrecipes recipes as structured data, scale ingredients, build grocery lists, and rank by Bayesian-smoothed popularity."

auth:
  type: none

config:
  format: toml
  path: "~/.config/allrecipes-pp-cli/config.toml"

cache:
  enabled: true

resources:
  recipes:
    description: "Public Allrecipes recipe pages with Schema.org Recipe JSON-LD markup"
    endpoints:
      search:
        method: GET
        path: "/search"
        description: "Search Allrecipes for recipes matching a query"
        response_format: html
        html_extract:
          mode: links
          link_prefixes:
            - /recipe/
          limit: 24
        params:
          - name: q
            type: string
            required: true
            description: "Search query (e.g. 'brownies')"
          - name: page
            type: int
            default: 1
            description: "Result page (1-indexed; default 1)"
        response:
          type: array
          item: SearchResult

      get:
        method: GET
        path: "/recipe/{recipe_id}/{slug}/"
        description: "Fetch a recipe by ID + slug; returns parsed JSON-LD Recipe"
        response_format: html
        html_extract:
          mode: page
        params:
          - name: recipe_id
            type: string
            required: true
            positional: true
            description: "Numeric recipe ID (e.g. 9599)"
          - name: slug
            type: string
            required: true
            positional: true
            description: "Recipe URL slug (e.g. quick-and-easy-brownies)"
        response:
          type: object
          item: Recipe

extra_commands:
  - name: recipe
    args: "<url-or-id>"
    description: "Fetch and render a single recipe by URL or ID"
  - name: search
    args: "<query>"
    description: "Search Allrecipes for recipes (live + cache)"
  - name: top-rated
    args: "<query>"
    description: "Search and rank by Bayesian-smoothed rating"
  - name: quick
    description: "Recipes from cache that fit a strict time cap and are top-rated"
  - name: pantry
    description: "Score cached recipes by overlap with a pantry file"
  - name: with-ingredient
    args: "<ingredient>"
    description: "Reverse index: cached recipes that use a given ingredient"
  - name: dietary
    description: "Filter cached recipes by gluten-free / vegan / low-carb"
  - name: cookbook
    description: "Compile a top-rated category into a markdown cookbook"
  - name: grocery-list
    args: "<urls...>"
    description: "Aggregate ingredients from many recipes into a deduped shopping list"
  - name: scale
    args: "<url>"
    description: "Rescale a recipe to a target serving count"
  - name: nutrition
    args: "<url>"
    description: "Show nutrition for a recipe (per serving and total)"
  - name: ingredients
    args: "<url>"
    description: "Show parsed ingredients for a recipe"
  - name: instructions
    args: "<url>"
    description: "Show numbered instructions for a recipe"
  - name: reviews
    args: "<url>"
    description: "Show review summary for a recipe"
  - name: category
    args: "<slug>"
    description: "Browse recipes in a category (e.g. dessert, weeknight)"
  - name: cuisine
    args: "<slug>"
    description: "Browse recipes by cuisine"
  - name: ingredient
    args: "<name>"
    description: "Browse recipes featuring a primary ingredient"
  - name: occasion
    args: "<slug>"
    description: "Browse recipes by occasion (holiday, weeknight, party)"
  - name: article
    args: "<url>"
    description: "Extract the body of an Allrecipes article page"
  - name: gallery
    args: "<url>"
    description: "Extract recipe links from an Allrecipes round-up gallery"
  - name: cook
    args: "<slug>"
    description: "Show a cook profile and their recipes"
  - name: export
    args: "<url>"
    description: "Export a recipe as markdown"
  - name: sync
    description: "Refresh cached recipes that are stale"
  - name: cache
    description: "Inspect, list, or clear the local recipe cache"
  - name: doctor
    description: "Diagnose connectivity, Cloudflare detection, and cache health"
