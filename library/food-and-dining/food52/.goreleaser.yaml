version: 2
project_name: food52-pp-cli
changelog:
  disable: true
builds:
  - id: food52-pp-cli
    main: ./cmd/food52-pp-cli
    binary: food52-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/food-and-dining/food52/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: food52-pp-mcp
    main: ./cmd/food52-pp-mcp
    binary: food52-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: food52-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search, browse, and read Food52 — recipes, articles, and structured ingredients/steps from the Food52 community-curated cookbook, with offline FTS and a local cache."
    install: |
      bin.install "food52-pp-cli"
      bin.install "food52-pp-mcp"
