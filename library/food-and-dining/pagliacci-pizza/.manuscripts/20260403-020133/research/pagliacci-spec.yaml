openapi: "3.0.3"
info:
  title: Pagliacci Pizza API
  description: >-
    REST API for Pagliacci Pizza - Seattle's favorite pizza. Browse stores,
    menus, slices, time windows, manage rewards, view order history, and place
    orders. Authenticated endpoints use the custom PagliacciAuth scheme with
    a required Version-Num header.
  version: "1.0.0"
servers:
  - url: https://pag-api.azurewebsites.net/api

security: []

paths:
  # ──────────────────────────────────────────────
  # Public endpoints (no auth)
  # ──────────────────────────────────────────────

  /Version:
    get:
      operationId: getVersion
      summary: Get API version
      description: Returns the current API version.
      tags:
        - system
      responses:
        "200":
          description: API version info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"

  /Store:
    get:
      operationId: listStores
      summary: List all Pagliacci Pizza stores
      description: >-
        Returns an array of all store locations with addresses, hours,
        amenities, and estimated wait times.
      tags:
        - stores
      responses:
        "200":
          description: Array of store objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"

  /QuoteStore:
    get:
      operationId: listQuoteStores
      summary: List store availability and pricing
      description: Returns store availability and pricing data across all locations.
      tags:
        - stores
      responses:
        "200":
          description: Array of store quote objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteStore"

  /QuoteStore/{storeId}:
    get:
      operationId: getQuoteStore
      summary: Get store-specific pricing
      description: Returns availability and pricing data for a specific store.
      tags:
        - stores
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
      responses:
        "200":
          description: Store quote object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteStore"

  /MenuTop/{storeId}:
    get:
      operationId: getMenuTop
      summary: Get featured menu items
      description: Returns the top/featured menu items for a specific store.
      tags:
        - menu
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
      responses:
        "200":
          description: Array of featured menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /MenuCache/{storeId}:
    get:
      operationId: getMenuCache
      summary: Get full cached menu
      description: >-
        Returns the full cached menu for a specific store including all
        categories and items.
      tags:
        - menu
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
      responses:
        "200":
          description: Full menu data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /MenuSlices:
    get:
      operationId: listMenuSlices
      summary: List available pizza slices
      description: Returns available pizza slices across all stores.
      tags:
        - menu
      responses:
        "200":
          description: Array of slice items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SliceItem"

  /TimeWindowDays/{storeId}/{serviceType}:
    get:
      operationId: getTimeWindowDays
      summary: Get available days for service
      description: >-
        Returns available days for delivery or pickup at a specific store.
      tags:
        - scheduling
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
        - name: serviceType
          in: path
          required: true
          schema:
            type: string
            enum:
              - PICK
              - DEL
          description: "Service type: PICK for pickup, DEL for delivery"
      responses:
        "200":
          description: Array of available days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeWindowDay"

  /TimeWindows/{storeId}/{serviceType}/{date}:
    get:
      operationId: getTimeWindowsByDate
      summary: Get time slots for a specific day
      description: >-
        Returns available time slots for a specific day at a store.
        Date format is YYYYMMDD.
      tags:
        - scheduling
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
        - name: serviceType
          in: path
          required: true
          schema:
            type: string
            enum:
              - PICK
              - DEL
          description: "Service type: PICK for pickup, DEL for delivery"
        - name: date
          in: path
          required: true
          schema:
            type: string
          description: Date in YYYYMMDD format
      responses:
        "200":
          description: Array of time windows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeWindow"

  /TimeWindows/{storeId}/{serviceType}:
    get:
      operationId: getTimeWindowsToday
      summary: Get today's time slots
      description: Returns available time slots for today at a store.
      tags:
        - scheduling
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
        - name: serviceType
          in: path
          required: true
          schema:
            type: string
            enum:
              - PICK
              - DEL
          description: "Service type: PICK for pickup, DEL for delivery"
      responses:
        "200":
          description: Array of time windows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeWindow"

  /SiteWideMessage:
    get:
      operationId: getSiteWideMessage
      summary: Get system-wide message
      description: Returns any active system-wide announcements or messages.
      tags:
        - system
      responses:
        "200":
          description: Site-wide message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteWideMessage"

  /ProductPrice:
    get:
      operationId: getProductPrice
      summary: Get product pricing
      description: Returns pricing information for products.
      tags:
        - menu
      responses:
        "200":
          description: Product price data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPrice"

  /AddressInfo:
    post:
      operationId: lookupAddress
      summary: Validate and look up a delivery address
      description: >-
        Validates a delivery address and returns store/delivery zone information.
      tags:
        - addresses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInfoRequest"
      responses:
        "200":
          description: Address validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressInfo"

  /Feedback:
    post:
      operationId: submitFeedback
      summary: Submit customer feedback
      description: Submits customer feedback to Pagliacci.
      tags:
        - feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "200":
          description: Feedback submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # ──────────────────────────────────────────────
  # Auth / session management
  # ──────────────────────────────────────────────

  /Login:
    post:
      operationId: login
      summary: Log in to account
      description: >-
        Creates a session with email and password credentials. Returns
        customerId and authToken used for the PagliacciAuth header.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login result with session credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /Logout:
    post:
      operationId: logout
      summary: Log out of account
      description: Ends the current session.
      tags:
        - auth
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /Register:
    post:
      operationId: register
      summary: Create a new account
      description: Registers a new customer account.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /PasswordForgot:
    post:
      operationId: forgotPassword
      summary: Request password reset email
      description: Sends a password reset email to the specified address.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /PasswordReset:
    post:
      operationId: resetPassword
      summary: Reset password
      description: Resets the account password using a reset token.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Password reset result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /MigrateQuestion:
    post:
      operationId: migrateQuestion
      summary: Get account migration question
      description: Returns the security question for account migration.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Migration question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrateQuestion"

  /MigrateAnswer:
    post:
      operationId: migrateAnswer
      summary: Answer account migration question
      description: Submits the answer to the migration security question.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MigrateAnswerRequest"
      responses:
        "200":
          description: Migration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /AccessDevice:
    get:
      operationId: getAccessDevice
      summary: Get device access info
      description: Returns device access and session information.
      tags:
        - auth
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Device access info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessDevice"

  # ──────────────────────────────────────────────
  # Auth-required endpoints
  # ──────────────────────────────────────────────

  /Customer/{customerId}:
    get:
      operationId: getCustomer
      summary: Get customer profile
      description: Returns the profile for the authenticated customer.
      tags:
        - customer
      security:
        - PagliacciAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
          description: Customer ID
      responses:
        "200":
          description: Customer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /AddressName:
    get:
      operationId: listSavedAddresses
      summary: List saved delivery addresses
      description: Returns saved delivery addresses for the authenticated user.
      tags:
        - addresses
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Array of saved addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddressSuggestion"

  /RewardCard:
    get:
      operationId: getRewardCard
      summary: Get loyalty rewards card
      description: >-
        Returns the rewards card information including points balance,
        value, and expiration for the authenticated user.
      tags:
        - rewards
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Reward card data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardCard"

  /StoredCoupons:
    get:
      operationId: listStoredCoupons
      summary: List saved coupons
      description: Returns saved coupons for the authenticated user.
      tags:
        - rewards
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Array of coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"

  /StoredCredit:
    get:
      operationId: getStoredCredit
      summary: Get account credit balance
      description: Returns the stored credit balance for the authenticated user.
      tags:
        - rewards
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Credit balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredCredit"

  /StoredGift:
    get:
      operationId: getStoredGift
      summary: Get gift card info
      description: Returns gift card information for the authenticated user.
      tags:
        - rewards
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Gift card data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredGift"

  /OrderList/{page}/{pageSize}:
    get:
      operationId: listOrders
      summary: List order history (paginated)
      description: Returns paginated order history for the authenticated user.
      tags:
        - orders
      security:
        - PagliacciAuth: []
      parameters:
        - name: page
          in: path
          required: true
          schema:
            type: integer
          description: Page number (1-based)
        - name: pageSize
          in: path
          required: true
          schema:
            type: integer
          description: Number of orders per page
      responses:
        "200":
          description: Array of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /OrderListPending:
    get:
      operationId: listPendingOrders
      summary: List active/pending orders
      description: Returns currently active or pending orders.
      tags:
        - orders
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Array of pending orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /OrderListItem/{orderId}:
    get:
      operationId: getOrderDetails
      summary: Get specific order details
      description: Returns detailed information for a specific order.
      tags:
        - orders
      security:
        - PagliacciAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /OrderSuggestion:
    get:
      operationId: getOrderSuggestion
      summary: Get suggested orders
      description: >-
        Returns personalized order suggestions based on order history.
      tags:
        - orders
      security:
        - PagliacciAuth: []
      responses:
        "200":
          description: Order suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSuggestion"

  /QuoteBuilding/{buildingId}:
    get:
      operationId: getQuoteBuilding
      summary: Get delivery building quote
      description: Returns delivery quote for a specific building.
      tags:
        - addresses
      security:
        - PagliacciAuth: []
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: integer
          description: Building ID
      responses:
        "200":
          description: Building delivery quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteBuilding"

  /OrderPrice:
    post:
      operationId: priceOrder
      summary: Price an order
      description: >-
        Calculates the total price for an order including tax and delivery fees.
      tags:
        - orders
      security:
        - PagliacciAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPriceRequest"
      responses:
        "200":
          description: Order pricing breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPriceResponse"

  /OrderPrice/guest:
    post:
      operationId: priceOrderGuest
      summary: Price an order as guest
      description: Calculates the total price for a guest checkout order.
      tags:
        - orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPriceRequest"
      responses:
        "200":
          description: Order pricing breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPriceResponse"

  /OrderSend:
    post:
      operationId: sendOrder
      summary: Submit an order
      description: Submits an order for processing and payment.
      tags:
        - orders
      security:
        - PagliacciAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderSendRequest"
      responses:
        "200":
          description: Order confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderConfirmation"

  /OrderSend/verify:
    post:
      operationId: verifyOrder
      summary: Verify an order before submission
      description: Validates an order without submitting it, checking for issues.
      tags:
        - orders
      security:
        - PagliacciAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderSendRequest"
      responses:
        "200":
          description: Order verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderVerification"

  /TransferGift:
    post:
      operationId: transferGift
      summary: Transfer a gift card
      description: Transfers a gift card to another account.
      tags:
        - rewards
      security:
        - PagliacciAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferGiftRequest"
      responses:
        "200":
          description: Transfer result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

components:
  securitySchemes:
    PagliacciAuth:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Custom auth header: `PagliacciAuth {customerId}|{authToken}`.
        The customerId and authToken values are obtained from the POST /Login
        response. A `Version-Num: 1.3` header is also required on all
        authenticated requests.

  schemas:
    Store:
      type: object
      properties:
        ID:
          type: integer
        Name:
          type: string
        Address:
          type: string
        City:
          type: string
        State:
          type: string
        Zip:
          type: string
        GPS:
          type: object
          properties:
            Lat:
              type: number
              format: double
            Lng:
              type: number
              format: double
        Phone:
          type: string
        Hours:
          type: array
          items:
            $ref: "#/components/schemas/StoreHours"
        DeliveryTime:
          type: integer
          description: Estimated delivery time in minutes
        PickupTime:
          type: integer
          description: Estimated pickup time in minutes
        Slices:
          type: boolean
          description: Whether the store offers slices
        Amenities:
          type: array
          items:
            type: string

    StoreHours:
      type: object
      properties:
        Day:
          type: string
        Open:
          type: string
        Close:
          type: string

    QuoteStore:
      type: object
      properties:
        StoreId:
          type: integer
        StoreName:
          type: string
        Available:
          type: boolean
        DeliveryFee:
          type: number
          format: double
        MinOrder:
          type: number
          format: double
        EstimatedDelivery:
          type: integer
        EstimatedPickup:
          type: integer

    MenuItem:
      type: object
      properties:
        ID:
          type: integer
        Name:
          type: string
        Description:
          type: string
        Category:
          type: string
        Price:
          type: number
          format: double
        ImageUrl:
          type: string
        Sizes:
          type: array
          items:
            $ref: "#/components/schemas/MenuItemSize"

    MenuItemSize:
      type: object
      properties:
        Name:
          type: string
        Price:
          type: number
          format: double

    SliceItem:
      type: object
      properties:
        ID:
          type: integer
        Name:
          type: string
        Description:
          type: string
        Price:
          type: number
          format: double
        StoreId:
          type: integer
        StoreName:
          type: string
        Available:
          type: boolean

    TimeWindowDay:
      type: object
      properties:
        Date:
          type: string
          description: Date in YYYYMMDD format
        DayName:
          type: string
        Available:
          type: boolean

    TimeWindow:
      type: object
      properties:
        StartTime:
          type: string
        EndTime:
          type: string
        Available:
          type: boolean

    VersionInfo:
      type: object
      properties:
        Version:
          type: string
        Build:
          type: string

    SiteWideMessage:
      type: object
      properties:
        Message:
          type: string
        Active:
          type: boolean

    AddressInfoRequest:
      type: object
      properties:
        Address:
          type: string
        City:
          type: string
        State:
          type: string
        Zip:
          type: string

    AddressInfo:
      type: object
      properties:
        Valid:
          type: boolean
        StoreId:
          type: integer
        DeliveryZone:
          type: string
        DeliveryFee:
          type: number
          format: double

    AddressSuggestion:
      type: object
      properties:
        Address:
          type: string
        City:
          type: string
        State:
          type: string
        Zip:
          type: string

    FeedbackRequest:
      type: object
      properties:
        Name:
          type: string
        Email:
          type: string
        Message:
          type: string
        OrderId:
          type: integer
        StoreId:
          type: integer

    ProductPrice:
      type: object
      properties:
        ProductId:
          type: integer
        Name:
          type: string
        BasePrice:
          type: number
          format: double
        Sizes:
          type: array
          items:
            $ref: "#/components/schemas/MenuItemSize"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        Success:
          type: boolean
        CustomerId:
          type: integer
          description: Used as the first part of the PagliacciAuth header value
        AuthToken:
          type: string
          description: Used as the second part of the PagliacciAuth header value

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    PasswordResetRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
        newPassword:
          type: string

    MigrateQuestion:
      type: object
      properties:
        Question:
          type: string
        Email:
          type: string

    MigrateAnswerRequest:
      type: object
      required:
        - email
        - answer
      properties:
        email:
          type: string
          format: email
        answer:
          type: string

    AccessDevice:
      type: object
      properties:
        DeviceId:
          type: string
        Platform:
          type: string
        LastAccess:
          type: string
          format: date-time

    Customer:
      type: object
      properties:
        ID:
          type: integer
        Phone:
          type: string
        Email:
