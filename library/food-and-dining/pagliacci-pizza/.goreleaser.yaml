version: 2
project_name: pagliacci-pizza-pp-cli
changelog:
  disable: true
builds:
  - id: pagliacci-pizza-pp-cli
    main: ./cmd/pagliacci-pizza-pp-cli
    binary: pagliacci-pizza-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/food-and-dining/pagliacci-pizza/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: pagliacci-pizza-pp-mcp
    main: ./cmd/pagliacci-pizza-pp-mcp
    binary: pagliacci-pizza-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pagliacci-pizza-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "CLI for the Pagliacci Pizza ordering API. Browse stores, menus, and
available slices; manage your cart, place orders, and track delivery
windows; manage saved addresses, rewards, stored coupons, credit, and
gifts. Backed by Pagliacci's Azure-hosted REST API and authenticated
via Chrome cookies (composed PagliacciAuth header)."
    install: |
      bin.install "pagliacci-pizza-pp-cli"
      bin.install "pagliacci-pizza-pp-mcp"
