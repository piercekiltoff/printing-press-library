version: 2
project_name: recipe-goat-pp-cli
changelog:
  disable: true
builds:
  - id: recipe-goat-pp-cli
    main: ./cmd/recipe-goat-pp-cli
    binary: recipe-goat-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/food-and-dining/recipe-goat/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: recipe-goat-pp-mcp
    main: ./cmd/recipe-goat-pp-mcp
    binary: recipe-goat-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: recipe-goat-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Recipe GOAT — find the best version of any recipe across 37 trusted sites (King Arthur, Serious Eats, Smitten Kitchen, AllRecipes, Food52, BBC Food, and 31 more), with offline cookbook, pantry match, substitution lookup, meal planning, and USDA-backed nutrition."
    install: |
      bin.install "recipe-goat-pp-cli"
      bin.install "recipe-goat-pp-mcp"
